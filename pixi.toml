[workspace]
name = "robot-skills"
version = "0.1.0"
description = "ROS2 Robot Skills Framework — pixi task runner and ROS package workspace"
preview = ["pixi-build"]
channels = [
  "https://prefix.dev/pixi-build-backends",
  "https://prefix.dev/robostack-jazzy",
  "https://prefix.dev/conda-forge",
]
platforms = ["osx-arm64", "osx-64", "linux-64"]

# Declares the minimum host glibc so Linux envs can pull packages like
# realsense2-camera and librealsense2 that gate on `__glibc >=2.34`. Mirrors
# the meca500_ros2 upstream workspace. Without this, pixi defaults to an
# older assumed glibc and the meca500-host env fails to solve.
[system-requirements]
libc = { family = "glibc", version = "2.34" }

[dependencies]
nodejs = ">=20"
rattler-index = ">=0.27"

[feature.ros-tools.dependencies]
ros-jazzy-ros2run = "*"
ros-jazzy-ros2launch = "*"
ros-jazzy-ros2action = "*"
ros-jazzy-ros2node = "*"
ros-jazzy-ros2service = "*"
ros-jazzy-ros2topic = "*"

[feature.local-dev.target.linux-64.dependencies]
python = ">=3.12,<3.13"
cmake = "*"
ninja = "*"
pkg-config = "*"
cxx-compiler = "*"
colcon-common-extensions = "*"
lxml = "*"
pyyaml = "*"
jsonschema = "*"
pytest = "*"
ros-jazzy-ament-cmake = "*"
ros-jazzy-ament-cmake-python = "*"
ros-jazzy-ament-cmake-pytest = "*"
ros-jazzy-ament-lint-auto = "*"
ros-jazzy-ament-lint-common = "*"
ros-jazzy-ament-copyright = "*"
ros-jazzy-ament-flake8 = "*"
ros-jazzy-ament-pep257 = "*"
ros-jazzy-ament-cmake-gtest = "*"
ros-jazzy-rosidl-default-generators = "*"
ros-jazzy-ros2run = "*"
ros-jazzy-ros2launch = "*"
ros-jazzy-ros2action = "*"
ros-jazzy-ros2node = "*"
ros-jazzy-ros2service = "*"
ros-jazzy-ros2topic = "*"
ros-jazzy-rclpy = "*"
ros-jazzy-rclcpp = "*"
ros-jazzy-rclcpp-action = "*"
ros-jazzy-rclcpp-components = "*"
ros-jazzy-action-msgs = "*"
ros-jazzy-geometry-msgs = "*"
ros-jazzy-sensor-msgs = "*"
ros-jazzy-std-msgs = "*"
ros-jazzy-diagnostic-msgs = "*"
ros-jazzy-diagnostic-updater = "*"
ros-jazzy-diagnostic-aggregator = "*"
ros-jazzy-tf2 = "*"
ros-jazzy-tf2-ros = "*"
ros-jazzy-tf2-geometry-msgs = "*"
ros-jazzy-robot-state-publisher = "*"
ros-jazzy-rosbridge-suite = "*"
ros-jazzy-behaviortree-cpp = "*"
ros-jazzy-moveit-resources-panda-description = "*"

[feature.lite-native]
platforms = ["linux-64"]
# ~/channel hosts `ros-jazzy-robot-skills-msgs` (built once by `pixi run
# bootstrap-msgs`). pixi-build-ros doesn't chain sibling path-deps through
# C++ build environments (verified on 0.67.2), so sibling C++ packages must
# find msgs in a channel at compile time. Per the official conclusion of
# pixi.prefix.dev/v0.66.0/build/ros/: "Once built, you can upload artifacts to
# a conda channel and depend on them from other Pixi workspaces." ~/channel
# is the local analog.
channels = [
  "~/channel",
  "https://prefix.dev/pixi-build-backends",
  "https://prefix.dev/robostack-jazzy",
  "https://prefix.dev/conda-forge",
]

[feature.lite-native.dependencies]
ros-jazzy-robot-skills-msgs      = "*"
ros-jazzy-robot-skill-advertise  = "*"
ros-jazzy-robot-arm-skills       = { path = "lib/robot_arm_skills" }
ros-jazzy-robot-skill-server     = { path = "src/robot_skill_server" }
ros-jazzy-robot-mock-skill-atoms = { path = "providers/panda_sim/src/robot_mock_skill_atoms" }
ros-jazzy-robot-behaviors        = { path = "src/robot_behaviors" }
ros-jazzy-robot-dashboard        = { path = "src/robot_dashboard" }
ros-jazzy-robot-sim-config       = { path = "providers/panda_sim/src/robot_sim_config" }
# rosbridge-suite on robostack doesn't pull in cbor2 automatically; without it
# rosbridge_websocket crashes with ModuleNotFoundError on startup.
cbor2 = "*"
# Launch-file-only runtime (not declared in any package.xml)
ros-jazzy-ros2launch            = "*"
ros-jazzy-robot-state-publisher = "*"
ros-jazzy-rosbridge-suite       = "*"
ros-jazzy-tf2-ros               = "*"
ros-jazzy-diagnostic-aggregator = "*"

[feature.lite-native.tasks]
# Dashboard defaults to port 8081 (matches Docker-lite convention in CLAUDE.md).
# Override at launch: `pixi run lite-native-run dashboard_port:=8082`.
lite-native-run   = { cmd = "ros2 launch robot_skill_server skill_server_lite.launch.py dashboard_port:=8081", description = "Launch lite stack natively (pixi auto-builds on install)" }
lite-native-shell = { cmd = "bash -i", description = "Shell in the lite-native pixi environment" }

[feature.real-native]
platforms = ["linux-64"]
channels = [
  "~/channel",
  "https://prefix.dev/pixi-build-backends",
  "https://prefix.dev/robostack-jazzy",
  "https://prefix.dev/conda-forge",
]

[feature.real-native.dependencies]
ros-jazzy-robot-skills-msgs     = "*"
ros-jazzy-robot-skill-advertise = "*"
ros-jazzy-robot-skill-server    = { path = "src/robot_skill_server" }
ros-jazzy-robot-arm-skills     = { path = "lib/robot_arm_skills" }
ros-jazzy-meca500-skill-server  = { path = "providers/meca500/src/meca500_skill_server" }
ros-jazzy-robot-behaviors    = { path = "src/robot_behaviors" }
ros-jazzy-robot-dashboard    = { path = "src/robot_dashboard" }
# rosbridge-suite on robostack doesn't pull in cbor2 automatically; without it
# rosbridge_websocket crashes with ModuleNotFoundError on startup.
cbor2 = "*"
# MoveIt2 runtime (connects to host's move_group over shared DDS domain)
ros-jazzy-moveit-ros-planning-interface = "*"
ros-jazzy-moveit-core                   = "*"
ros-jazzy-moveit-msgs                   = "*"
# ros2_control runtime
ros-jazzy-control-msgs            = "*"
ros-jazzy-controller-manager-msgs = "*"
# Launch / bridge / diagnostics / tf / viz
ros-jazzy-ros2launch            = "*"
ros-jazzy-rosbridge-suite       = "*"
ros-jazzy-tf2                   = "*"
ros-jazzy-tf2-ros               = "*"
ros-jazzy-tf2-geometry-msgs     = "*"
ros-jazzy-diagnostic-aggregator = "*"
ros-jazzy-rviz2                 = "*"
# record_rosbag skill shells out to `ros2 bag record`
ros-jazzy-ros2bag                          = "*"
ros-jazzy-rosbag2-storage-default-plugins  = "*"

[feature.real-native.tasks]
real-native-run   = { cmd = "ros2 launch robot_skill_server skill_server.launch.py hardware_mode:=real use_rviz:=false use_rosboard:=false", description = "Launch real stack natively (pixi auto-builds on install; connects to host MoveIt2)" }
real-native-shell = { cmd = "bash -i", description = "Shell in the real-native pixi environment" }

# ── Orchestrator PC env (skill server + dashboard only; atoms live on remote hosts) ──
[feature.orchestrator]
platforms = ["linux-64"]
channels = [
  "~/channel",
  "https://prefix.dev/pixi-build-backends",
  "https://prefix.dev/robostack-jazzy",
  "https://prefix.dev/conda-forge",
]

[feature.orchestrator.dependencies]
ros-jazzy-robot-skills-msgs     = "*"
ros-jazzy-robot-skill-advertise = "*"
ros-jazzy-robot-skill-server    = { path = "src/robot_skill_server" }
ros-jazzy-robot-behaviors    = { path = "src/robot_behaviors" }
ros-jazzy-robot-dashboard    = { path = "src/robot_dashboard" }
# Provider-defined interfaces the orchestrator needs to call into:
# tree_executor imports these msgs packages to build action goals.
liconic_msgs       = { path = "providers/pbi_liconic/ros2_ws/src/liconic_msgs" }
hamilton_star_msgs = { path = "providers/pbi_liconic/ros2_ws/src/hamilton_star_msgs" }
cbor2 = "*"
ros-jazzy-ros2launch            = "*"
ros-jazzy-rosbridge-suite       = "*"
ros-jazzy-tf2                   = "*"
ros-jazzy-tf2-ros               = "*"
ros-jazzy-diagnostic-aggregator = "*"
# record_rosbag skill (in robot_arm_skills) shells out to `ros2 bag record`
ros-jazzy-ros2bag                          = "*"
ros-jazzy-rosbag2-storage-default-plugins  = "*"

[feature.orchestrator.tasks]
orchestrator-run   = { cmd = "ros2 launch robot_skill_server skill_server.launch.py hardware_mode:=real use_rviz:=false use_rosboard:=false", description = "Run skill_server + dashboard only; atoms must run on their own host PCs (see meca500-host, provider-liconic tasks)" }
orchestrator-shell = { cmd = "bash -i", description = "Shell in the orchestrator pixi environment" }

# ── Meca500 robot PC env (runs skill_atoms under /meca500 + providers/meca500 packages) ──
# Path-deps into providers/meca500/src/* — each sub-package has [package.build] pixi-build-ros.
# Upstream also has providers/meca500/pixi.toml; we ignore that nested workspace and
# reference the leaf packages directly from here.
[feature.meca500-host]
platforms = ["linux-64"]
channels = [
  "~/channel",
  "https://prefix.dev/pixi-build-backends",
  "https://prefix.dev/robostack-jazzy",
  "https://prefix.dev/conda-forge",
]

[feature.meca500-host.dependencies]
ros-jazzy-robot-skills-msgs     = "*"
ros-jazzy-robot-skill-advertise = "*"
ros-jazzy-robot-arm-skills     = { path = "lib/robot_arm_skills" }
ros-jazzy-robot-skill-server    = { path = "src/robot_skill_server" }   # needed for skill_atoms_remote.launch.py + launch_helpers
ros-jazzy-meca500-description   = { path = "providers/meca500/src/meca500_description" }
ros-jazzy-meca500-hardware      = { path = "providers/meca500/src/meca500_hardware" }
ros-jazzy-meca500-moveit        = { path = "providers/meca500/src/meca500_moveit" }
ros-jazzy-meca500-bringup       = { path = "providers/meca500/src/meca500_bringup" }
ros-jazzy-meca500-skill-server  = { path = "providers/meca500/src/meca500_skill_server" }
# meca500_bringup's moveit.launch.py pulls these in via `Node(package=...)`
# and `IncludeLaunchDescription(...)`. Since they're not declared as
# <depend> in its package.xml (only <exec_depend>), the robostack mapping
# doesn't surface them into the env — list them explicitly.
ros-jazzy-ros2launch                    = "*"
ros-jazzy-ros2cli                       = "*"
ros-jazzy-ros2action                    = "*"
ros-jazzy-ros2topic                     = "*"
ros-jazzy-ros2node                      = "*"
ros-jazzy-ros2service                   = "*"
ros-jazzy-ros2interface                 = "*"
ros-jazzy-moveit-ros-move-group         = "*"
ros-jazzy-moveit-ros-planning-interface = "*"
ros-jazzy-moveit-ros-planning           = "*"
ros-jazzy-moveit-core                   = "*"
ros-jazzy-moveit-msgs                   = "*"
ros-jazzy-moveit-kinematics             = "*"
ros-jazzy-moveit-planners               = "*"
ros-jazzy-moveit-simple-controller-manager = "*"
ros-jazzy-moveit-configs-utils          = "*"
ros-jazzy-control-msgs                  = "*"
ros-jazzy-controller-manager-msgs       = "*"
ros-jazzy-controller-manager            = "*"
# controller_manager's `spawner` Python entry point imports `filelock` but
# robostack doesn't list it as a dep. Add it explicitly.
filelock                                = "*"
ros-jazzy-ros2-control                  = "*"
ros-jazzy-ros2-controllers              = "*"
ros-jazzy-joint-state-broadcaster       = "*"
ros-jazzy-joint-state-publisher         = "*"
ros-jazzy-joint-trajectory-controller   = "*"
ros-jazzy-position-controllers          = "*"
ros-jazzy-gripper-controllers           = "*"
ros-jazzy-robot-state-publisher         = "*"
ros-jazzy-xacro                         = "*"
ros-jazzy-tf2                           = "*"
ros-jazzy-tf2-ros                       = "*"
ros-jazzy-tf2-geometry-msgs             = "*"

[feature.meca500-host.tasks]
meca500-moveit-run     = { cmd = "ros2 launch meca500_bringup moveit.launch.py", description = "Bring up Meca500 MoveIt2 stack (real hardware; robot_ip arg optional)" }
meca500-moveit-sim-run = { cmd = "ros2 launch meca500_bringup moveit.launch.py simulation:=true enable_realsense:=false", description = "Bring up Meca500 MoveIt2 stack against fake_hardware (mock_components/GenericSystem; no real robot, no camera)" }
meca500-atoms-run      = { cmd = "ros2 launch robot_skill_server skill_atoms_remote.launch.py robot_name:=meca500", description = "Start skill atoms under /meca500; they self-register with the orchestrator's SkillRegistry over DDS" }
# Composite: MoveIt sim + atoms + orchestrator in one launch
meca500-sim-test       = { cmd = "ros2 launch robot_skill_server sim_meca500.launch.py", description = "Meca500 sim (mock_components) + atoms + orchestrator in one launch. Submit test_meca500_sim.xml in another shell." }
meca500-proxy-test     = { cmd = "ros2 launch meca500_skill_server sim_meca500_proxy.launch.py", description = "Phase 2 validation: Meca500 sim + meca500_skill_server proxy (one process, one combined manifest) + orchestrator. Submit test_meca500_sim.xml in another shell." }
meca500-shell          = { cmd = "bash -i", description = "Shell in the meca500-host pixi environment" }

# ── Liconic + Hamilton host PC env (runs both action servers + their clients) ──
# Now that pbi_liconic is on Jazzy, all 5 packages path-dep into the root workspace.
# One box can run both servers simultaneously, or split across two PCs by selecting
# only the relevant launch tasks from this env.
[feature.liconic-host]
platforms = ["linux-64"]
channels = [
  "~/channel",
  "https://prefix.dev/pixi-build-backends",
  "https://prefix.dev/robostack-jazzy",
  "https://prefix.dev/conda-forge",
]

[feature.liconic-host.dependencies]
ros-jazzy-robot-skills-msgs     = "*"
ros-jazzy-robot-skill-advertise = "*"
# robot_skill_server is needed for the sim_hamilton.launch.py /
# sim_liconic.launch.py composite launches that run the orchestrator
# alongside the provider sim in a single ros2 launch invocation.
ros-jazzy-robot-skill-server = { path = "src/robot_skill_server" }
liconic_msgs          = { path = "providers/pbi_liconic/ros2_ws/src/liconic_msgs" }
liconic_ros           = { path = "providers/pbi_liconic/ros2_ws/src/liconic_ros" }
hamilton_star_msgs    = { path = "providers/pbi_liconic/ros2_ws/src/hamilton_star_msgs" }
hamilton_star_ros     = { path = "providers/pbi_liconic/ros2_ws/src/hamilton_star_ros" }
hamilton_star_bringup = { path = "providers/pbi_liconic/ros2_ws/src/hamilton_star_bringup" }
ros-jazzy-ros2launch = "*"
# ros2 CLI subcommands (action/topic/node/service/interface) — needed for
# diagnostics and direct action calls without the orchestrator in the loop.
ros-jazzy-ros2cli       = "*"
ros-jazzy-ros2action    = "*"
ros-jazzy-ros2topic     = "*"
ros-jazzy-ros2node      = "*"
ros-jazzy-ros2service   = "*"
ros-jazzy-ros2interface = "*"
libusb = "*"
transitions = "*"
pyserial = "*"

[feature.liconic-host.pypi-dependencies]
pylabrobot = { version = "*", extras = ["usb"] }
fastapi = "*"
uvicorn = "*"

[feature.liconic-host.tasks]
liconic-server        = { cmd = "ros2 launch liconic_ros liconic.launch.py", description = "Start Liconic STX44 action server against real hardware" }
liconic-server-sim    = { cmd = "ros2 launch liconic_ros liconic.launch.py simulation:=true", description = "Start Liconic STX44 action server with the in-memory sim backend (LiconicSimBackend; no serial, no hardware)" }
hamilton-server       = { cmd = "ros2 launch hamilton_star_bringup action_server.launch.py backend:=star", description = "Start Hamilton STAR action server against real USB hardware" }
hamilton-server-sim   = { cmd = "ros2 launch hamilton_star_bringup action_server.launch.py backend:=simulator", description = "Start Hamilton STAR action server against STARChatterbox simulator (no hardware needed)" }
# Composite "everything in one shot" launches — sim server + skill_server orchestrator
hamilton-sim-test     = { cmd = "ros2 launch robot_skill_server sim_hamilton.launch.py", description = "Hamilton sim + orchestrator in one launch. Submit test_hamilton_sim.xml in another shell." }
liconic-sim-test      = { cmd = "ros2 launch robot_skill_server sim_liconic.launch.py", description = "Liconic sim + orchestrator in one launch. Submit test_liconic_smoke.xml in another shell." }
liconic-host-shell    = { cmd = "bash -i", description = "Shell in the liconic-host pixi environment" }

# ── Whole-lab sim env (every provider + orchestrator + dashboard on one box) ──
# Targets the workflow "I just want to click presets in the UI and watch
# them run". One pixi env, one ros2 launch, every sim plus the web UI.
# Production setups should still use the per-host envs (meca500-host,
# liconic-host, orchestrator) — this is for dev / smoke tests.
[feature.lab-sim]
platforms = ["linux-64"]
channels = [
  "~/channel",
  "https://prefix.dev/pixi-build-backends",
  "https://prefix.dev/robostack-jazzy",
  "https://prefix.dev/conda-forge",
]

[feature.lab-sim.dependencies]
# Framework
ros-jazzy-robot-skills-msgs     = "*"
ros-jazzy-robot-skill-advertise = "*"
ros-jazzy-robot-skill-server    = { path = "src/robot_skill_server" }
ros-jazzy-robot-arm-skills     = { path = "lib/robot_arm_skills" }
ros-jazzy-robot-behaviors    = { path = "src/robot_behaviors" }
ros-jazzy-robot-dashboard    = { path = "src/robot_dashboard" }
# Meca500 provider
ros-jazzy-meca500-description   = { path = "providers/meca500/src/meca500_description" }
ros-jazzy-meca500-hardware      = { path = "providers/meca500/src/meca500_hardware" }
ros-jazzy-meca500-moveit        = { path = "providers/meca500/src/meca500_moveit" }
ros-jazzy-meca500-bringup       = { path = "providers/meca500/src/meca500_bringup" }
ros-jazzy-meca500-skill-server  = { path = "providers/meca500/src/meca500_skill_server" }
# Liconic + Hamilton provider
liconic_msgs          = { path = "providers/pbi_liconic/ros2_ws/src/liconic_msgs" }
liconic_ros           = { path = "providers/pbi_liconic/ros2_ws/src/liconic_ros" }
hamilton_star_msgs    = { path = "providers/pbi_liconic/ros2_ws/src/hamilton_star_msgs" }
hamilton_star_ros     = { path = "providers/pbi_liconic/ros2_ws/src/hamilton_star_ros" }
hamilton_star_bringup = { path = "providers/pbi_liconic/ros2_ws/src/hamilton_star_bringup" }
# rosbridge + dashboard runtime
cbor2 = "*"
ros-jazzy-rosbridge-suite = "*"
# Provider sim deps
libusb       = "*"
transitions  = "*"
pyserial     = "*"
# MoveIt + ros2_control runtime (Meca500 sim needs the full stack)
ros-jazzy-ros2launch                       = "*"
ros-jazzy-ros2cli                          = "*"
ros-jazzy-ros2action                       = "*"
ros-jazzy-ros2topic                        = "*"
ros-jazzy-ros2node                         = "*"
ros-jazzy-ros2service                      = "*"
ros-jazzy-ros2interface                    = "*"
ros-jazzy-moveit-ros-move-group            = "*"
ros-jazzy-moveit-ros-planning-interface    = "*"
ros-jazzy-moveit-ros-planning              = "*"
ros-jazzy-moveit-core                      = "*"
ros-jazzy-moveit-msgs                      = "*"
ros-jazzy-moveit-kinematics                = "*"
ros-jazzy-moveit-planners                  = "*"
ros-jazzy-moveit-simple-controller-manager = "*"
ros-jazzy-moveit-configs-utils             = "*"
ros-jazzy-control-msgs                     = "*"
ros-jazzy-controller-manager-msgs          = "*"
ros-jazzy-controller-manager               = "*"
filelock                                   = "*"   # controller_manager spawner
ros-jazzy-ros2-control                     = "*"
ros-jazzy-ros2-controllers                 = "*"
ros-jazzy-joint-state-broadcaster          = "*"
ros-jazzy-joint-state-publisher            = "*"
ros-jazzy-joint-trajectory-controller      = "*"
ros-jazzy-position-controllers             = "*"
ros-jazzy-gripper-controllers              = "*"
ros-jazzy-robot-state-publisher            = "*"
ros-jazzy-xacro                            = "*"
ros-jazzy-tf2                              = "*"
ros-jazzy-tf2-ros                          = "*"
ros-jazzy-tf2-geometry-msgs                = "*"
ros-jazzy-diagnostic-aggregator            = "*"
# record_rosbag skill (in robot_arm_skills) shells out to `ros2 bag record`
ros-jazzy-ros2bag                          = "*"
ros-jazzy-rosbag2-storage-default-plugins  = "*"

[feature.lab-sim.pypi-dependencies]
pylabrobot = { version = "*", extras = ["usb"] }
fastapi = "*"
uvicorn = "*"

[feature.lab-sim.tasks]
lab-sim-run   = { cmd = "ros2 launch robot_skill_server sim_lab.launch.py", description = "Launch every provider sim + orchestrator + dashboard. Open http://localhost:8081 to drive BTs from the UI." }
lab-sim-shell = { cmd = "bash -i", description = "Shell in the lab-sim pixi environment" }
lab-run       = { cmd = "ros2 launch robot_skill_server lab_full.launch.py", description = "Launch every provider in BOTH real-mode and sim-mode (paired /sim namespace). Lets the orchestrator dry-run trees on the sim before running on real. http://localhost:8081 to drive BTs." }

# ── MCP server env (BT executor exposed as Model Context Protocol over stdio) ──
# Lightweight env: just rclpy + msgs + the mcp PyPI lib. No skill_server here —
# this env is a CLIENT of /skill_server/... endpoints, so the orchestrator must
# already be running (e.g. pixi run lite-native-up or lab-sim-up). Wire into
# Claude Code via .mcp.json:
#   { "mcpServers": { "bt-executor": { "command": "pixi",
#       "args": ["run", "-e", "mcp", "bt-mcp"],
#       "cwd": "/home/eit/robot_behaviours" } } }
[feature.mcp]
platforms = ["linux-64"]
channels = [
  "~/channel",
  "https://prefix.dev/pixi-build-backends",
  "https://prefix.dev/robostack-jazzy",
  "https://prefix.dev/conda-forge",
]

[feature.mcp.dependencies]
ros-jazzy-rclpy                  = "*"
ros-jazzy-robot-skills-msgs      = "*"
ros-jazzy-robot-skill-advertise  = "*"
ros-jazzy-robot-skill-mcp        = { path = "agent/robot_skill_mcp" }
ros-jazzy-robot-script-server    = { path = "agent/robot_script_server" }
ros-jazzy-std-msgs               = "*"
pyyaml                           = "*"

[feature.mcp.pypi-dependencies]
mcp = ">=1.0"

[feature.mcp.tasks]
bt-mcp       = { cmd = "ros2 run robot_skill_mcp bt_executor_mcp", description = "Run the BT executor MCP server on stdio. Lives on the agent's machine; talks to the orchestrator's /skill_server/... endpoints over DDS." }
bt-mcp-shell = { cmd = "bash -i", description = "Shell in the mcp pixi environment" }

[environments]
ros-tools    = ["ros-tools"]
local-dev    = ["local-dev"]
lite-native  = ["lite-native"]
real-native  = ["real-native"]
orchestrator = ["orchestrator"]
meca500-host = ["meca500-host"]
liconic-host = ["liconic-host"]
lab-sim      = ["lab-sim"]
mcp          = ["mcp"]

[tasks]
# ── msgs channel (populates ~/channel) ───────────────────────────────────────
# scripts/bootstrap-msgs.sh rebuilds robot_skills_msgs into ~/channel. The
# script runs OUTSIDE `pixi run` so it works from a clean checkout (pixi 0.67
# eagerly resolves every environment — while ~/channel doesn't exist yet the
# lite-native / real-native envs can't be solved and no `pixi run *` task can
# start). After first bootstrap, ~/channel has valid repodata and every pixi
# task works, including this one as a fast incremental rebuild during dev.
update-msgs = { cmd = "bash scripts/bootstrap-msgs.sh", description = "Rebuild robot_skills_msgs into ~/channel after editing .msg/.srv/.action files" }

# ── Top-level build pointer ──────────────────────────────────────────────────
build = "echo 'First use: `bash scripts/bootstrap-msgs.sh` (once per machine). Then: `pixi run lite-native-up` or `pixi run real-native-up`.'"

# ── Native lite stack (mirrors lite-*, no Docker) ────────────────────────────
# depends-on chains: update-msgs → dashboard-build → install env → launch.
# `pixi run lite-native-run` is in [feature.lite-native.tasks] so pixi auto-
# selects the lite-native environment.
lite-native-install = { cmd = "pixi install --environment lite-native", depends-on = ["update-msgs", "dashboard-build"], description = "Rebuild msgs + dashboard + resolve lite-native env (builds every path-dep ROS package)" }
lite-native-up      = { cmd = "pixi run lite-native-run", depends-on = ["lite-native-install"], description = "Build and launch lite stack natively (no Docker)" }

# ── Native real stack (mirrors real-*, connects to host MoveIt2, no Docker) ──
real-native-install = { cmd = "pixi install --environment real-native", depends-on = ["update-msgs", "dashboard-build"], description = "Rebuild msgs + dashboard + resolve real-native env (includes skill_atoms)" }
real-native-up      = { cmd = "pixi run real-native-run", depends-on = ["real-native-install"], description = "Build and launch real stack natively (connects to host MoveIt2)" }

# ── Shared native helpers ────────────────────────────────────────────────────
native-clean = { cmd = "rm -rf .pixi/build .pixi/envs/lite-native .pixi/envs/real-native .pixi/envs/orchestrator .pixi/envs/meca500-host .pixi/envs/liconic-host .pixi/envs/lab-sim", description = "Delete pixi-build cache and native envs (keeps ~/channel — use `rm -rf ~/channel` to wipe msgs too)" }

# ── Orchestrator PC (skill_server + dashboard only) ──────────────────────────
orchestrator-install = { cmd = "pixi install --environment orchestrator", depends-on = ["update-msgs", "dashboard-build"], description = "Rebuild msgs + dashboard + resolve orchestrator env" }
orchestrator-up      = { cmd = "pixi run orchestrator-run", depends-on = ["orchestrator-install"], description = "Launch skill_server + dashboard on the orchestrator PC (no local atoms)" }

# ── Meca500 robot PC ─────────────────────────────────────────────────────────
meca500-host-install = { cmd = "pixi install --environment meca500-host", depends-on = ["update-msgs"], description = "Resolve meca500-host env (pulls in providers/meca500 path-deps)" }
meca500-up           = { cmd = "pixi run meca500-atoms-run", depends-on = ["meca500-host-install"], description = "Start Meca500 skill atoms under /meca500 (assumes MoveIt2 already running; launch with `pixi run meca500-moveit-run` in another shell)" }
meca500-sim-up       = { cmd = "ros2 launch meca500_bringup moveit.launch.py simulation:=true", depends-on = ["meca500-host-install"], description = "Bring up the Meca500 MoveIt sim (fake_hardware) — ready to receive plans from skill atoms or direct MoveGroup clients" }

# ── Liconic / Hamilton STAR PC ──────────────────────────────────────────────
# pbi_liconic is now on Jazzy, so all 5 packages path-dep into the root
# workspace as the `liconic-host` env. The nested pbi_liconic/pixi.toml still
# works as a standalone dev workspace for tests that don't touch robot_skills_msgs.
liconic-host-install  = { cmd = "pixi install --environment liconic-host", depends-on = ["update-msgs"], description = "Resolve liconic-host env (pulls in all 5 providers/pbi_liconic packages)" }
liconic-up            = { cmd = "pixi run liconic-server", depends-on = ["liconic-host-install"], description = "Start Liconic STX44 action server against real hardware" }
liconic-sim-up        = { cmd = "pixi run liconic-server-sim", depends-on = ["liconic-host-install"], description = "Start Liconic STX44 action server with in-memory sim backend (no hardware)" }
hamilton-up           = { cmd = "pixi run hamilton-server", depends-on = ["liconic-host-install"], description = "Start Hamilton STAR action server against real USB hardware" }
hamilton-sim-up       = { cmd = "pixi run hamilton-server-sim", depends-on = ["liconic-host-install"], description = "Start Hamilton STAR action server against the STARChatterbox simulator (no hardware)" }

# ── Whole-lab sim (every provider + orchestrator + dashboard, one launch) ────
lab-sim-install       = { cmd = "pixi install --environment lab-sim", depends-on = ["update-msgs", "dashboard-build"], description = "Build msgs + dashboard frontend + resolve lab-sim env (every provider + framework)" }
lab-sim-up            = { cmd = "pixi run lab-sim-run", depends-on = ["lab-sim-install"], description = "Build everything and launch all sims + skill_server + dashboard. http://localhost:8081 to drive BTs." }
lab-up                = { cmd = "pixi run lab-run", depends-on = ["lab-sim-install"], description = "Like lab-sim-up but brings up real-mode AND sim-mode action servers side-by-side under paired namespaces. Use target_mode=MODE_SIM_THEN_REAL to dry-run a tree on /sim before running on real." }

# ── MCP (BT executor over Model Context Protocol on stdio) ────────────────────
mcp-install = { cmd = "pixi install --environment mcp", depends-on = ["update-msgs"], description = "Resolve mcp env (rclpy + msgs + mcp PyPI lib)" }
mcp-up      = { cmd = "pixi run -e mcp bt-mcp", depends-on = ["mcp-install"], description = "Run the BT executor MCP server on stdio. Requires the orchestrator to already be running." }

ros2 = { cmd = "ros2", default-environment = "ros-tools", description = "Run ros2 from the Pixi ROS tools environment" }

# ── Local dev runtime (no Docker) ────────────────────────────────────────────
dev = { cmd = "pixi run dev-up", description = "Build and run the lite stack locally" }
dev-build = { cmd = "pixi run dashboard-build && colcon --log-base .pixi/colcon/log build --symlink-install --build-base .pixi/colcon/build --install-base .pixi/colcon/install --packages-select robot_skills_msgs robot_sim_config robot_mock_skill_atoms robot_skill_server robot_behaviors robot_dashboard --cmake-args -DCMAKE_BUILD_TYPE=RelWithDebInfo", default-environment = "local-dev", description = "Build the lite ROS workspace locally with colcon" }
dev-build-fast = { cmd = "colcon --log-base .pixi/colcon/log build --symlink-install --build-base .pixi/colcon/build --install-base .pixi/colcon/install --packages-select robot_skills_msgs robot_sim_config robot_mock_skill_atoms robot_skill_server robot_behaviors robot_dashboard --cmake-args -DCMAKE_BUILD_TYPE=RelWithDebInfo", default-environment = "local-dev", description = "Rebuild local ROS packages without rebuilding the dashboard frontend" }
dev-up = { cmd = "pixi run dev-build && bash -lc 'source .pixi/colcon/install/setup.bash && ros2 launch robot_skill_server skill_server_lite.launch.py'", default-environment = "local-dev", description = "Build and launch the lite stack locally" }
dev-run = { cmd = "bash -lc 'source .pixi/colcon/install/setup.bash && ros2 launch robot_skill_server skill_server_lite.launch.py'", default-environment = "local-dev", description = "Launch the already-built lite stack locally" }
dev-shell = { cmd = "bash -lc 'source .pixi/colcon/install/setup.bash 2>/dev/null || true; exec bash -i'", default-environment = "local-dev", description = "Open a shell in the local Pixi ROS environment" }
dev-status = { cmd = "bash -lc 'source .pixi/colcon/install/setup.bash 2>/dev/null || true; echo Nodes:; ros2 node list; echo; echo Skill services:; ros2 service list | rg skill_server || true; echo; echo Key topics:; ros2 topic list | rg \"skill_server|joint_states|/tf\" || true'", default-environment = "local-dev", description = "Show local ROS graph status" }
dev-test = { cmd = "colcon --log-base .pixi/colcon/log build --symlink-install --build-base .pixi/colcon/build --install-base .pixi/colcon/install --packages-select robot_skills_msgs robot_sim_config robot_mock_skill_atoms robot_skill_server robot_behaviors robot_dashboard --cmake-args -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_TESTING=ON && colcon --log-base .pixi/colcon/log test --build-base .pixi/colcon/build --install-base .pixi/colcon/install --packages-select robot_skills_msgs robot_sim_config robot_mock_skill_atoms robot_skill_server robot_behaviors robot_dashboard && colcon test-result --test-result-base .pixi/colcon/build --verbose", default-environment = "local-dev", description = "Run local ROS tests in the Pixi environment" }
status = { cmd = "pixi run dev-status", description = "Show local ROS graph status" }
test = { cmd = "pixi run dev-test", description = "Run local ROS tests in the Pixi environment" }

# ── Dashboard ───────────────────────────────────────────────────────────────
dashboard-dev = { cmd = "cd src/robot_dashboard/frontend && npx vite --host", description = "Run dashboard dev server with hot-reload" }
dashboard-build = { cmd = "cd src/robot_dashboard/frontend && npm ci && npm run build", description = "Build dashboard frontend for production" }

# ── Lite sim (no MoveIt2, single container) ──────────────────────────────────
lite-image = { cmd = "docker compose -f docker-compose.lite.yml build", description = "Build lite sim Docker image" }
lite-up = { cmd = "docker compose -f docker-compose.lite.yml up -d", description = "Start lite sim container" }
lite-down = { cmd = "docker compose -f docker-compose.lite.yml down", description = "Stop lite sim container" }
lite-shell = { cmd = "docker exec -it ros2_robot_skills_lite bash", description = "Shell into lite container" }
lite-logs = { cmd = "docker compose -f docker-compose.lite.yml logs -f", description = "Follow lite container logs" }
lite-restart = { cmd = "docker compose -f docker-compose.lite.yml restart", description = "Restart lite container" }
docker-status = { cmd = "docker compose -f docker-compose.lite.yml ps && docker compose ps dev", description = "Show lite and real Docker container status" }

# ── Real robot (connects to host MoveIt2, no sim) ───────────────────────────
real-image = { cmd = "docker compose build dev", description = "Build real robot Docker image" }
real-up = { cmd = "docker compose up -d dev", description = "Start skill server for real robot (host MoveIt2)" }
real-down = { cmd = "docker compose down", description = "Stop real robot container" }
real-shell = { cmd = "docker exec -it ros2_robot_skills_dev bash", description = "Shell into dev container" }
real-logs = { cmd = "docker compose logs -f dev", description = "Follow real robot logs" }
real-restart = { cmd = "docker compose restart dev", description = "Restart real robot container" }

# ── Docker fallback test (inside whichever container is running) ─────────────
# C++ is compiled in the Docker image. Python/XML changes are instant via
# symlink-install + volume mount. Rebuild the image (*-image) for C++ changes.
docker-test = { cmd = """
  if docker ps --format '{{.Names}}' | grep -q ros2_robot_skills_lite; then
    docker exec ros2_robot_skills_lite bash -c \
      'source /opt/ros/jazzy/setup.bash && source /home/ws/install/setup.bash && \
       cd /home/ws && colcon test && colcon test-result --verbose'
  elif docker ps --format '{{.Names}}' | grep -q ros2_robot_skills_dev; then
    docker exec ros2_robot_skills_dev bash -c \
      'source /opt/ros/jazzy/setup.bash && source /home/ws/install/setup.bash && \
       cd /home/ws && colcon test && colcon test-result --verbose'
  else
    echo 'No running container found. Run: pixi run lite-up' && exit 1
  fi
""", description = "Run all tests in running container" }
