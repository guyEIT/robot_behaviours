# ament_cmake package — launch files + deck/handoff config. Trivial
# install, no codegen. Depends on hamilton_star_ros + hamilton_star_msgs
# at exec time (declared in package.xml).
[package]
name = "hamilton_star_bringup"
version = "0.1.0"
description = "Launch files, deck configuration, and systemd unit for the Hamilton STAR action server."

[package.build]
backend = { name = "pixi-build-ros", version = "*" }

[package.build.config]
distro = "humble"
# Watch launch/ + config/ + systemd/ — pixi-build-ros's default input
# set (package.xml + CMakeLists.txt) doesn't include these, so edits to
# e.g. star_deck.json wouldn't otherwise trigger a rebuild.
extra-input-globs = [
  "launch/**/*",
  "config/**/*",
  "systemd/**/*",
]
# Both sibling packages are built locally; redirect the auto-mapped
# `ros-humble-*` names back to the unprefixed conda names
# pixi-build-ros publishes them under.
extra-package-mappings = [
  { hamilton_star_msgs = { conda = ["hamilton_star_msgs"] } },
  { hamilton_star_ros = { conda = ["hamilton_star_ros"] } },
]

# Path-deps on the sibling packages — bringup pulls them in as runtime
# deps (launch file loads them; operator tools run against them).
[package.run-dependencies]
hamilton_star_msgs = { path = "../hamilton_star_msgs" }
hamilton_star_ros = { path = "../hamilton_star_ros" }
