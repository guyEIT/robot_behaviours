# Standalone Docker Compose for development without VS Code devcontainer.
#
# Usage:
#   docker compose up -d          # start dev container
#   docker compose exec dev bash  # shell into it
#
#   docker compose --profile sim up -d   # also start sim container
#
# The .devcontainer/ setup remains available for VS Code users.

services:
  dev:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    image: ros2-jazzy-robot-skills:latest
    container_name: ros2_robot_skills_dev

    network_mode: host
    ipc: host

    stdin_open: true
    tty: true

    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - RCUTILS_COLORIZED_OUTPUT=1
      - ROBOT_HARDWARE_MODE=${ROBOT_HARDWARE_MODE:-sim}

    volumes:
      # Workspace source
      - .:/home/ws:rw
      # X11 display socket
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Build cache (shared with devcontainer)
      - ros2_ccache:/home/ros/.ccache
      - ros2_colcon_build:/home/ws/build
      - ros2_colcon_install:/home/ws/install
      - ros2_colcon_log:/home/ws/log

    user: ros
    entrypoint: ["/bin/bash", "-c",
      "sudo chown -R ros:ros /home/ws/build /home/ws/install /home/ws/log /home/ros/.ccache 2>/dev/null; exec bash"]
    depends_on:
      sim:
        condition: service_healthy

  sim:
    build:
      context: .devcontainer
      dockerfile: Dockerfile.sim
    image: ros2-jazzy-robot-sim:latest
    container_name: ros2_robot_sim
    network_mode: host
    ipc: host

    stdin_open: true
    tty: true

    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - RCUTILS_COLORIZED_OUTPUT=1

    volumes:
      - ./src:/home/ws/src:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - sim_colcon_build:/home/ws/build
      - sim_colcon_install:/home/ws/install
      - sim_colcon_log:/home/ws/log

    healthcheck:
      test: ["CMD-SHELL",
             "source /opt/ros/jazzy/setup.bash && \
              source /home/ws/install/setup.bash 2>/dev/null || true && \
              ros2 node list 2>/dev/null | grep -q move_group && echo OK || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  ros2_ccache:
  ros2_colcon_build:
  ros2_colcon_install:
  ros2_colcon_log:
  sim_colcon_build:
    name: ros2_robot_sim_build
  sim_colcon_install:
    name: ros2_robot_sim_install
  sim_colcon_log:
    name: ros2_robot_sim_log
