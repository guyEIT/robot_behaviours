# Docker Compose for the Robot Skills Framework.
#
# Usage:
#   docker compose build              # build images (includes colcon build)
#   docker compose up -d              # start sim + dev containers
#   docker compose exec dev bash      # shell into dev container
#   docker compose down               # stop everything

services:
  dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    image: ros2-jazzy-robot-skills:latest
    container_name: ros2_robot_skills_dev

    network_mode: host
    ipc: host

    stdin_open: true
    tty: true

    environment:
      - DISPLAY=${DISPLAY:-:1}
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - RCUTILS_COLORIZED_OUTPUT=1
      - ROBOT_HARDWARE_MODE=${ROBOT_HARDWARE_MODE:-sim}

    volumes:
      # Mount source for development — edit on host, rebuild in container
      - ./src:/home/ws/src:rw
      # X11 display socket
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Build cache persisted across container restarts
      - ros2_ccache:/home/ros/.ccache

    user: ros
    depends_on:
      sim:
        condition: service_healthy

  sim:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.sim
    image: ros2-jazzy-robot-sim:latest
    container_name: ros2_robot_sim
    network_mode: host
    ipc: host

    stdin_open: true
    tty: true

    environment:
      - DISPLAY=${DISPLAY:-:1}
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - RCUTILS_COLORIZED_OUTPUT=1

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    healthcheck:
      test: ["CMD-SHELL",
             "bash -c 'source /opt/ros/jazzy/setup.bash && \
              source /home/ws/install/setup.bash 2>/dev/null; \
              ros2 node list 2>/dev/null | grep -q move_group'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

volumes:
  ros2_ccache:
