# microscope stand + camera offsets — generated by microscope_visualizer
# rpy is intrinsic XYZ (roll, pitch, yaw) in radians; xyz in meters.
#
# Calibration closed 2026-04-30 after:
#   1. `meca500-calibrate-up` re-run with the corrected target_in_marker
#      (-0.02769, -0.04715, 0) in imaging_aruco_target.yaml — compensates
#      for the OpenCV ArUco corner-vs-centre quirk on this cv2 build.
#   2. Jog seed_gripper_tip_link to the printed cross-hair / physical
#      camera centre — `calibration_target_centre -> tip` now resolves to
#      (~0, ~0, +0.027) (sub-mm in X/Y; Z is just the tip stand-off above
#      the page).
#   3. Robot tip confirmed coincident with the camera centre → anchor
#      microscope_camera directly on calibration_target_centre.
stl_scale: 0.001
stand:
  # Parented to calibration_target_centre so the rig hangs off the optically
  # resolved imaging centre. yaw=π is the STL's modelled-orientation
  # correction (model faces the wrong way without it). XY/Z residuals are
  # the visualizer's last live state — keep or zero out as you prefer.
  parent_frame: calibration_target_centre
  xyz:
  - 0.0012075826525688171
  - 0.0
  - 0.0002518966794013977
  rpy:
  - 0.0
  - 0.0
  - 3.141592653589793
camera:
  # microscope_camera == calibration_target_centre (the cross-hair on the
  # printed page) after the 2026-04-30 closure: the gripper-tip alignment
  # confirmed the optical-axis hit point coincides with the cross-hair, so
  # this frame is anchored there directly. yaw=π is the CAD mesh's
  # modelled-orientation correction; the image's 180°-around-its-own-Z is
  # on the optical frame's optical_yaw (imaging_station_scene.launch.py),
  # NOT here, so the model and image rotation don't double-count.
  # The chained imaging_station_camera_optical_frame sits 0.193 m along
  # +Z above this via optical_offset_z — that's the body-to-sensor
  # stand-off, confirmed correct by the user.
  parent_frame: calibration_target_centre
  # Empirical XY (2026-04-30 re-calibration after marker_size_m fixed to
  # 0.04785 m): jogged seed_gripper_tip_link to the physical camera centre
  # and read live `calibration_target_centre -> tip` — that's where
  # microscope_camera (and its chained optical frame) should sit. Z stays
  # 0; optical_offset_z (0.193 m) on the optical frame's TF carries the
  # body-to-sensor stand-off (user confirmed Z was fine).
  xyz:
  - -0.04143
  -  0.03358
  -  0.0
  rpy:
  - 0.0
  - 0.0
  - 3.141592653589793
