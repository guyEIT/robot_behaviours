# microscope stand + camera offsets — generated by microscope_visualizer
# rpy is intrinsic XYZ (roll, pitch, yaw) in radians; xyz in meters.
# Chain: world -> microscope_stand -> microscope_camera. Tune the stand to
# match where the rig is bolted to the bench (same idea as the mecatable
# pose in providers/meca500/src/meca500_bringup/config/table.yaml), then
# tune the camera relative to the stand so the macro lens sits exactly
# above the centre target on calibration_target_a4.pdf.
stl_scale: 0.001
stand:
  # Parented to calibration_target_centre so the rig hangs off the optically
  # resolved imaging centre — the cross-hair the ArUco calibrator produces.
  # Run pixi run meca500-calibrate-up (or override stand_parent_frame:=world)
  # to make this TF available before launching tune-microscope. yaw=π is
  # the STL's modelled-orientation correction (model faces the wrong way
  # without it) — fine-tune from there.
  parent_frame: calibration_target_centre
  xyz:
  - 0.0
  - 0.0
  - 0.0
  rpy:
  - 0.0
  - 0.0
  - 3.141592653589793
camera:
  # Independently tuned relative to calibration_target_centre, not chained
  # off the stand — what you're tuning is the translation/rotation of each
  # mesh against the optical centre frame, both anchored at the same datum.
  parent_frame: calibration_target_centre
  xyz:
  - 0.0
  - 0.0
  - 0.0
  rpy:
  - 0.0
  - 0.0
  - 3.141592653589793
