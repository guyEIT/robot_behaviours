aruco_target:
  # IMAGING-STATION fiducial. Detected in the same camera view as the
  # robot fiducial (providers/meca500/src/meca500_bringup/config/aruco_target.yaml)
  # but its role is the opposite: detection IS the truth, marker_in_parent
  # is computed (not given). Matches the printable target at
  # providers/imaging_station/calibration/calibration_target_a4.{svg,pdf}.
  enable_startup_calibration: true
  role: imaging_target
  dictionary: DICT_4X4_50
  marker_id: 0
  # Measured 2026-04-30 with calipers on the printed PDF: 47.85 mm square,
  # not the 50 mm the SVG specifies — the printer scaled to ~95.7%. Telling
  # OpenCV the wrong size makes its camera→marker translation magnitude
  # off by the same ratio, so re-run `meca500-calibrate-up` after editing
  # this value to refresh imaging_calibration.yaml's marker_in_camera.
  marker_size_m: 0.04785
  averaging_window_s: 5.0

  # Centre-target pose in the marker frame.
  # In theory (OpenCV ArUco docs: marker frame at fiducial CENTRE, +x right,
  # +y up, +z out of page) this should be (0, -0.080, 0) — cross-hair sits
  # 80 mm below the fiducial centre on the printed PDF. In practice the
  # cv2 build this workspace ships emits the marker frame at a corner of
  # the printed fiducial, so the empirical offset is bigger:
  #   measured 2026-04-30 by jogging seed_gripper_tip_link to the cross-hair
  #   on the printed page and reading TF calibration_marker -> tip:
  #     x = -0.02769, y = -0.04715, z = +0.0312 (tip stand-off above page)
  # Keep Z=0 (the cross-hair is coplanar with the marker on the page);
  # absorb only the X/Y measurement into the offset. Re-measure if the
  # OpenCV ArUco convention changes upstream or the printed target swaps.
  target_in_marker:
    x: -0.02769
    y: -0.04715
    z: 0.0
    roll: 0.0
    pitch: 0.0
    yaw: 0.0

  # Frame ids the calibrator publishes once a stable detection has averaged.
  # Chain ends up as: <camera_link> -> calibration_marker -> calibration_target_centre.
  marker_frame_id: calibration_marker
  target_frame_id: calibration_target_centre
  publish_marker_frame: true
  publish_target_frame: true

  notes: |
    Imaging-station fiducial. Print providers/imaging_station/calibration/
    calibration_target_a4.pdf at 100% scale, mount flat under the macro
    camera, and run pixi run aruco-calibrate-run alongside the robot
    fiducial. The averaged camera->marker pose is published as a static
    TF, and the centre-target frame is chained off it via target_in_marker
    so the imaging station can plan motions to the cross-hair directly.
