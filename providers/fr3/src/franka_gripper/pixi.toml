# Action server for the Franka Hand. Talks to libfranka over the network.
[package.build]
backend = { name = "pixi-build-ros", version = "*" }

[package.build.config]
distro = "jazzy"
extra-input-globs = [
  "include/**/*",
  "src/**/*",
  "scripts/**/*",
  "launch/**/*",
  "config/**/*",
]
extra-package-mappings = [
  { libfranka = { conda = ["libfranka"] } },
]

[package.host-dependencies]
ros-jazzy-franka-msgs = { path = "../franka_msgs" }
libfranka = ">=0.21.1"

[package.build-dependencies]
ros-jazzy-franka-msgs = { path = "../franka_msgs" }
libfranka = ">=0.21.1"
