# MoveIt2 controller configuration
# Maps MoveIt planning groups to ros2_control trajectory controllers
#
# arm_controller: FollowJointTrajectory for the 7-DOF arm
# gripper_controller: GripperCommand for the Panda hand
#   Action: /gripper_controller/gripper_cmd
#   This matches GripperControlSkill's default action server name.

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

trajectory_execution:
  allowed_execution_duration_scaling: 1.2
  allowed_goal_duration_margin: 0.5
  allowed_start_tolerance: 0.01
  execution_duration_monitoring: false  # Disable for simulation (mock controllers are instant)

moveit_simple_controller_manager:
  controller_names:
    - arm_controller
    - gripper_controller

  arm_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7

  gripper_controller:
    action_ns: gripper_cmd
    type: GripperCommand
    default: true
    joints:
      - panda_finger_joint1
      - panda_finger_joint2
