# ament_cmake package with rosidl action/msg/srv generation for the
# Liconic STX incubator action server. Mirrors hamilton_star_msgs.
[package]
name = "liconic_msgs"
version = "0.1.0"
description = "Action, service, and message definitions for the Liconic STX incubator ROS 2 action server."

[package.build]
backend = { name = "pixi-build-ros", version = "*" }

[package.build.config]
distro = "humble"
extra-input-globs = [
  "msg/**/*.msg",
  "srv/**/*.srv",
  "action/**/*.action",
]
