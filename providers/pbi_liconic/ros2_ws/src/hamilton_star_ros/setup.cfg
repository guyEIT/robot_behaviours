[develop]
script_dir=$base/lib/hamilton_star_ros
[install]
install_scripts=$base/lib/hamilton_star_ros

[tool:pytest]
# Suppress DeprecationWarnings that come from third-party deps (lark
# uses Python 3.12-deprecated ``sre_parse`` / ``sre_constants``). We
# still show warnings from our own code — only ignore the noisy
# upstream ones.
filterwarnings =
    ignore:module 'sre_parse' is deprecated:DeprecationWarning
    ignore:module 'sre_constants' is deprecated:DeprecationWarning
