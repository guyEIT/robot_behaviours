aruco_target:
  # ROBOT-side fiducial (camera-extrinsic calibration). Rigidly mounted at a
  # known pose on the bench / mecatable; detection inverts to give the
  # camera_link transform that gets written to camera_calibration.yaml.
  # See providers/imaging_station/calibration/imaging_aruco_target.yaml for
  # the imaging-station fiducial that runs in the *same* camera view.
  enable_startup_calibration: false
  role: camera_extrinsic
  dictionary: DICT_6X6_250
  marker_id: 23
  marker_size_m: 0.05
  averaging_window_s: 5.0
  marker_in_parent:
    x: 0.09
    y: 0.0
    z: 0.0
    roll: 0.0
    pitch: 0.0
    yaw: 3.14159
  notes: Single-marker startup calibration target. Set marker_in_parent pose before use, and print at exactly 50 mm square.
