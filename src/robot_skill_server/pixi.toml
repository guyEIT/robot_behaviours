[package.build]
backend = { name = "pixi-build-ros", version = "*" }

[package.build.config]
distro = "jazzy"
extra-input-globs = [
  "config/**/*",
  "launch/**/*.py",
  "test/**/*.py",
  # ament_cmake_python package: Python sources live under robot_skill_server/
  # and are installed via ament_python_install_package. Without this glob,
  # pixi-build-ros doesn't detect edits to tree_executor.py / skill_registry.py
  # and the installed env keeps stale .pyc files.
  "robot_skill_server/**/*.py",
]
extra-package-mappings = [
  { python3-jsonschema = { conda = "jsonschema" } },
  { python3-lxml       = { conda = "lxml" } },
  { python3-yaml       = { conda = "pyyaml" } },
]
