# Multi-robot configuration — single source of truth for all robots in the system.
#
# To add a robot: add a new entry under `robots:`.
# To remove a robot: delete or comment out its entry.
#
# `local: true`  — skill atoms for this robot are launched on the skill-server PC.
# `local: false` — skill atoms run on the robot's own PC and self-register via DDS.
#                  Use skill_atoms_remote.launch.py on the remote PC.
#
# `robot_namespace` (derived from `namespace` below) prefixes only the skill
# atom's own action server (e.g. /meca500/skill_atoms/move_to_named_config).
# MoveIt2 connections (move_group, joint_states, controllers) use the absolute
# paths in `arm_controller_action` and are NOT affected by the namespace.
#
# Network requirements: all PCs must share the same ROS_DOMAIN_ID and have
# ROS_LOCALHOST_ONLY=0, ROS_AUTOMATIC_DISCOVERY_RANGE=SUBNET.

robots:
  meca500:
    namespace: "/meca500"
    planning_group: "meca500_arm"
    velocity_scaling: 0.1
    arm_controller_action: "/joint_trajectory_controller/follow_joint_trajectory"
    allowed_named_configs: ["home"]
    has_gripper: true
    local: true
    # Use "arm_controller" / "gripper_controller" (not the literal controller node
     # names) — check_system_ready_skill.cpp dispatches on these system labels and
     # looks up the actual action-server path via the arm_controller_action /
     # gripper_controller_action params set from robots.yaml (see launch_helpers.py).
    check_systems: ["move_group", "joint_states", "arm_controller", "gripper_controller"]
    workspace:
      min_x: -0.6
      max_x: 0.6
      min_y: -0.6
      max_y: 0.6
      min_z: -0.05
      max_z: 0.7

  # Lab-sim "robot" — launched by sim_lab.launch.py. Same hardware shape as
  # meca500 (same SRDF planning group, same controllers when running against
  # mock_components/GenericSystem) but with NO namespace, so atoms register
  # under bare `/skill_atoms/<name>` paths. That way every preset BT in the
  # repo (full_demo, human_interaction_demo, pick_and_place, seed_*, etc.)
  # works in lab-sim without per-tree `server_name=` overrides.
  #
  # Real-hardware deployments still use the namespaced `meca500` entry above
  # so multi-robot setups stay unambiguous.
  lab_sim:
    namespace: ""
    planning_group: "meca500_arm"
    velocity_scaling: 0.1
    arm_controller_action: "/joint_trajectory_controller/follow_joint_trajectory"
    allowed_named_configs: ["home"]
    has_gripper: true
    local: true
    # No real camera on the dev box — DetectObject and CapturePointCloud
    # synthesise positive results so trees that depend on perception
    # (full_demo, pick_and_place, seed_collection) round-trip end-to-end
    # in lab-sim without a real camera or detection model.
    simulate_perception: true
    check_systems: ["move_group", "joint_states", "arm_controller", "gripper_controller"]
    workspace:
      min_x: -0.6
      max_x: 0.6
      min_y: -0.6
      max_y: 0.6
      min_z: -0.05
      max_z: 0.7

  # Franka FR3 + Franka Hand. The FR3's MoveIt2 runs on its own PC alongside
  # the franka_gripper_node; skill atoms are launched on that PC via
  # `pixi run fr3-real-up` (or per-component via `fr3-atoms-run`).
  #
  # `check_systems` deliberately omits `gripper_controller` because the
  # Franka Hand is NOT a ros2_control controller — it's a separate
  # franka_gripper action server. Gripper readiness is exercised
  # implicitly by the FrankaGripperControl skill (mode=HOMING) at the
  # start of each tree.
  fr3:
    namespace: "/fr3"
    planning_group: "fr3_arm"
    velocity_scaling: 0.3
    arm_controller_action: "/fr3_arm_controller/follow_joint_trajectory"
    allowed_named_configs: ["ready", "extended"]
    has_gripper: true
    local: false
    check_systems: ["move_group", "joint_states", "arm_controller"]
    workspace:
      min_x: -0.85
      max_x: 0.85
      min_y: -0.85
      max_y: 0.85
      min_z: 0.0
      max_z: 1.2

  # FR3 lab-sim peer of the meca500 lab_sim entry. Same SRDF planning group
  # but at root namespace so test BTs (test_fr3_sim.xml) need no overrides.
  fr3_lab_sim:
    namespace: ""
    planning_group: "fr3_arm"
    velocity_scaling: 0.3
    arm_controller_action: "/fr3_arm_controller/follow_joint_trajectory"
    allowed_named_configs: ["ready", "extended"]
    has_gripper: true
    local: true
    # franka_gripper_node is NOT launched in sim (it can't talk to libfranka
    # without a real robot). The franka_gripper_skill atom short-circuits via
    # simulate_grasp:=true so trees still resolve FrankaGripperControl goals.
    simulate_perception: true
    check_systems: ["move_group", "joint_states", "arm_controller"]
    workspace:
      min_x: -0.85
      max_x: 0.85
      min_y: -0.85
      max_y: 0.85
      min_z: 0.0
      max_z: 1.2
