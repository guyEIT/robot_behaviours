# Multi-robot configuration — single source of truth for all robots in the system.
#
# To add a robot: add a new entry under `robots:`.
# To remove a robot: delete or comment out its entry.
#
# `local: true`  — skill atoms for this robot are launched on the skill-server PC.
# `local: false` — skill atoms run on the robot's own PC and self-register via DDS.
#                  Use skill_atoms_remote.launch.py on the remote PC.
#
# `robot_namespace` (derived from `namespace` below) prefixes only the skill
# atom's own action server (e.g. /meca500/skill_atoms/move_to_named_config).
# MoveIt2 connections (move_group, joint_states, controllers) use the absolute
# paths in `arm_controller_action` and are NOT affected by the namespace.
#
# Network requirements: all PCs must share the same ROS_DOMAIN_ID and have
# ROS_LOCALHOST_ONLY=0, ROS_AUTOMATIC_DISCOVERY_RANGE=SUBNET.

robots:
  meca500:
    namespace: "/meca500"
    planning_group: "meca500_arm"
    velocity_scaling: 0.1
    arm_controller_action: "/joint_trajectory_controller/follow_joint_trajectory"
    allowed_named_configs: ["home"]
    has_gripper: false
    local: true
    check_systems: ["move_group", "joint_states", "joint_trajectory_controller"]
    workspace:
      min_x: -0.6
      max_x: 0.6
      min_y: -0.6
      max_y: 0.6
      min_z: -0.05
      max_z: 0.7

  # Uncomment when the Franka PC is ready.
  # The Franka's MoveIt2 runs on its own PC; skill atoms are launched there
  # via: ros2 launch robot_skill_server skill_atoms_remote.launch.py robot_name:=franka
