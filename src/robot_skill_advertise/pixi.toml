[workspace]
# Standalone-build channel list. Mirrors the root workspace channels so
# `pixi build --path src/robot_skill_advertise` (invoked from
# scripts/bootstrap-msgs.sh) can resolve robot_skills_msgs from ~/channel
# before this package itself is published into ~/channel.
channels = [
  "~/channel",
  "https://prefix.dev/pixi-build-backends",
  "https://prefix.dev/robostack-jazzy",
  "https://prefix.dev/conda-forge",
]
preview = ["pixi-build"]
platforms = ["linux-64"]

[package.build]
backend = { name = "pixi-build-ros", version = "*" }

[package.build.config]
distro = "jazzy"
extra-input-globs = [
  "robot_skill_advertise/**/*.py",
  "include/**/*.hpp",
]

[package.host-dependencies]
ros-jazzy-robot-skills-msgs = "*"

[package.build-dependencies]
ros-jazzy-robot-skills-msgs = "*"
