# ros2_control controller manager configuration
# Defines controllers that will be loaded by controller_manager

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz - controller update frequency

    # Controllers to load
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/GripperActionController

# Arm trajectory controller configuration
arm_controller:
  ros__parameters:
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0  # Disable time constraint for simulation
    gains:
      panda_joint1: {p: 5000.0, i: 0.0, d: 100.0, i_clamp: 1.0}
      panda_joint2: {p: 5000.0, i: 0.0, d: 100.0, i_clamp: 1.0}
      panda_joint3: {p: 5000.0, i: 0.0, d: 100.0, i_clamp: 1.0}
      panda_joint4: {p: 5000.0, i: 0.0, d: 100.0, i_clamp: 1.0}
      panda_joint5: {p: 3000.0, i: 0.0, d: 50.0,  i_clamp: 1.0}
      panda_joint6: {p: 3000.0, i: 0.0, d: 50.0,  i_clamp: 1.0}
      panda_joint7: {p: 3000.0, i: 0.0, d: 50.0,  i_clamp: 1.0}

# Gripper action controller configuration
gripper_controller:
  ros__parameters:
    joint: panda_finger_joint1
    goal_tolerance: 0.01
    max_effort: 100.0
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0
    allow_stalling: true  # Allow force-controlled stall detection
