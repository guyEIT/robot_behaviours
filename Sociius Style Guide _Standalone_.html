B-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n/* ── ROOT TOKENS ───────────────────────────────────────────────── */\n:root {\n  --terracotta: #A96D4B;\n  --terracotta-hover: #8F5A3C;\n  --terracotta-soft: #A17258;\n  --terracotta-tint: rgba(169,109,75,.08);\n  --ink: #000;\n  --ink-soft: #1E1E1E;\n  --ink-2: #3a3a3a;\n  --paper: #fff;\n  --cream: #F6F4EC;\n  --cream-deep: #FBF9F5;\n  --stone: #F0E9E2;\n  --hair: #D7D7D7;\n  --hair-soft: #EEEEEE;\n  --muted: #9a8f83;\n  --muted-2: #AAAAAA;\n  --ok: #2f7d5f;\n  --ok-soft: #E8F2EC;\n  --warn: #A96D4B;\n  --err: #9B2C2C;\n  --err-soft: #F7E7E7;\n  --running: #51748C;\n  --running-soft: #E4ECF2;\n  --f-display: \"Source Sans 3\",\"Helvetica Neue\",system-ui,sans-serif;\n  --f-mono: \"Source Code Pro\",\"SF Mono\",ui-monospace,monospace;\n}\n\n/* ── RESET ─────────────────────────────────────────────────────── */\n*{box-sizing:border-box;margin:0;padding:0}\nhtml{font-size:16px;-webkit-font-smoothing:antialiased}\nbody{\n  font-family:var(--f-display);\n  background:var(--cream);\n  color:var(--ink);\n  line-height:1.5;\n}\n\n/* ── LAYOUT ────────────────────────────────────────────────────── */\n.page{display:flex;min-height:100vh}\n.nav{\n  width:220px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;\n  background:var(--paper);border-right:1px solid var(--hair);\n  display:flex;flex-direction:column;\n}\n.nav-brand{\n  padding:24px 20px 20px;border-bottom:1px solid var(--hair);\n  display:flex;align-items:center;gap:12px;\n}\n.nav-dot{\n  width:32px;height:32px;border-radius:50%;background:var(--terracotta);\n  display:flex;align-items:center;justify-content:center;\n  color:#fff;font-family:var(--f-mono);font-size:11px;font-weight:700;letter-spacing:.04em;flex-shrink:0;\n}\n.nav-title{font-size:15px;font-weight:400;letter-spacing:-.01em}\n.nav-subtitle{font-family:var(--f-mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--terracotta)}\n.nav-section{padding:20px 0 0}\n.nav-section-label{\n  padding:0 20px 8px;font-family:var(--f-mono);font-size:9px;\n  text-transform:uppercase;letter-spacing:.14em;color:var(--muted-2);\n}\n.nav-link{\n  display:block;padding:7px 20px;font-size:13.5px;color:var(--ink-soft);\n  text-decoration:none;border-left:2px solid transparent;transition:all .12s;\n}\n.nav-link:hover{color:var(--ink);background:var(--cream);border-color:var(--terracotta)}\n.nav-link.active{color:var(--terracotta);border-color:var(--terracotta);background:var(--terracotta-tint)}\n\n.main{flex:1;min-width:0;padding:0 0 120px}\n\n/* ── SECTION ANATOMY ───────────────────────────────────────────── */\n.section{padding:64px 72px;border-bottom:1px solid var(--hair)}\n.section:last-child{border-bottom:none}\n.section-tag{\n  display:inline-flex;padding:8px 14px;border:1px solid var(--terracotta);\n  color:var(--terracotta);font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;\n}\n.section-title{\n  font-family:var(--f-display);font-weight:300;font-size:40px;line-height:1.12;\n  letter-spacing:-.01em;margin:14px 0 10px;\n}\n.section-note{font-size:16px;line-height:1.6;color:var(--ink-soft);max-width:64ch;margin-bottom:36px}\n\n/* ── HERO ──────────────────────────────────────────────────────── */\n.hero{\n  background:var(--paper);border-bottom:1px solid var(--hair);\n  padding:64px 72px 56px;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:end;\n}\n.hero-label{\n  font-family:var(--f-mono);font-size:11px;text-transform:uppercase;\n  letter-spacing:.14em;color:var(--terracotta);margin-bottom:24px;\n}\n.hero-title{\n  font-family:var(--f-display);font-weight:300;font-size:52px;line-height:1.08;\n  letter-spacing:-.01em;max-width:16ch;\n}\n.hero-version{\n  font-family:var(--f-mono);font-size:11px;text-transform:uppercase;\n  letter-spacing:.12em;color:var(--muted);margin-top:20px;\n}\n.hero-desc{font-size:17px;line-height:1.6;color:var(--ink-soft);max-width:52ch;margin-top:24px}\n\n/* ── GRID HELPERS ──────────────────────────────────────────────── */\n.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--hair);border:1px solid var(--hair)}\n.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--hair);border:1px solid var(--hair)}\n.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--hair);border:1px solid var(--hair)}\n.cell{background:var(--paper);padding:24px 28px}\n.cell-sm{background:var(--paper);padding:16px 20px}\n.cell.cream{background:var(--cream)}\n.cell-label{font-family:var(--f-mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--terracotta);margin-bottom:12px}\n.cell-note{font-family:var(--f-mono);font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:.04em}\n.cell-name{font-weight:600;font-size:14px;margin-bottom:2px}\n\n/* ── COLOR SWATCHES ────────────────────────────────────────────── */\n.swatch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--hair);border:1px solid var(--hair);margin-bottom:32px}\n.swatch{background:var(--paper);padding:0;overflow:hidden}\n.swatch-chip{height:72px}\n.swatch-info{padding:14px 16px}\n.swatch-name{font-weight:600;font-size:13px;margin-bottom:2px}\n.swatch-hex{font-family:var(--f-mono);font-size:12px;color:var(--terracotta);letter-spacing:.04em;margin-bottom:4px}\n.swatch-var{font-family:var(--f-mono);font-size:10px;color:var(--muted);letter-spacing:.04em;margin-bottom:4px}\n.swatch-use{font-size:12px;color:var(--ink-soft);line-height:1.4}\n\n/* ── TYPE SCALE ────────────────────────────────────────────────── */\n.type-table{border:1px solid var(--hair);background:var(--paper)}\n.type-row{\n  display:grid;grid-template-columns:200px 1fr;gap:24px;\n  padding:20px 24px;border-top:1px solid var(--hair-soft);align-items:baseline;\n}\n.type-row:first-child{border-top:none}\n.type-meta .name{font-family:var(--f-mono);font-size:11px;color:var(--terracotta);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}\n.type-meta .spec{font-family:var(--f-mono);font-size:10px;color:var(--muted);line-height:1.6}\n\n/* ── SPACING ───────────────────────────────────────────────────── */\n.spacing-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:16px}\n.spacing-cell{background:var(--paper);border:1px solid var(--hair);padding:16px;display:flex;flex-direction:column;gap:10px;align-items:flex-start}\n.spacing-bar{background:var(--terracotta);height:8px;border-radius:0}\n.spacing-val{font-weight:700;font-size:14px}\n.spacing-tag{font-family:var(--f-mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}\n\n/* ── COMPONENT DEMOS ───────────────────────────────────────────── */\n.comp-card{background:var(--paper);border:1px solid var(--hair);padding:28px 32px;margin-bottom:1px}\n.comp-title{font-weight:500;font-size:17px;margin-bottom:3px}\n.comp-hint{font-family:var(--f-mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:20px}\n.comp-demo{display:flex;gap:12px;flex-wrap:wrap;align-items:center}\n.comp-demo.col{flex-direction:column;align-items:flex-start}\n\n/* ── BUTTONS ───────────────────────────────────────────────────── */\n.btn{\n  display:inline-flex;align-items:center;gap:8px;padding:9px 18px;\n  font-family:var(--f-display);font-weight:500;font-size:14px;letter-spacing:.03em;\n  border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap;\n  text-decoration:none;\n}\n.btn-primary{background:var(--terracotta);color:#fff;border:1px solid var(--terracotta)}\n.btn-primary:hover{background:var(--terracotta-hover);border-color:var(--terracotta-hover)}\n.btn-secondary{background:transparent;color:var(--ink);border:1px solid var(--terracotta)}\n.btn-secondary:hover{background:var(--terracotta-tint)}\n.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--hair)}\n.btn-ghost:hover{background:var(--cream)}\n.btn-link{background:transparent;color:var(--terracotta);border:none;border-bottom:1px solid var(--terracotta);border-radius:0;padding:6px 0}\n.btn-sm{padding:6px 12px;font-size:13px}\n.btn-disabled{opacity:.45;cursor:not-allowed}\n\n/* ── STATUS CHIPS ──────────────────────────────────────────────── */\n.chip{\n  display:inline-flex;align-items:center;gap:8px;padding:5px 12px;\n  font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;\n  border-radius:999px;font-family:var(--f-display);\n}\n.chip-idle{color:var(--muted);border:1px solid var(--hair)}\n.chip-running{color:var(--running);background:var(--running-soft);border:1px solid var(--running)}\n.chip-done{color:var(--ok);background:var(--ok-soft);border:1px solid var(--ok)}\n.chip-failed{color:var(--err);background:var(--err-soft);border:1px solid var(--err)}\n.chip-dot{width:6px;height:6px;border-radius:50%;background:currentColor}\n\n/* ── EYEBROW / TAG ─────────────────────────────────────────────── */\n.eyebrow{\n  font-family:var(--f-mono);font-size:11px;letter-spacing:.12em;\n  text-transform:uppercase;color:var(--terracotta);font-weight:600;\n}\n.tag-chip{\n  display:inline-flex;align-items:center;padding:8px 14px;\n  border:1px solid var(--terracotta);color:var(--terracotta);\n  font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;\n}\n.tag-chip.filled{background:var(--terracotta);color:#fff}\n\n/* ── STEP INDICATORS ───────────────────────────────────────────── */\n.step-dot{\n  width:28px;height:28px;border-radius:50%;display:inline-flex;\n  align-items:center;justify-content:center;font-family:var(--f-mono);\n  font-size:11px;font-weight:600;letter-spacing:.04em;flex-shrink:0;\n}\n.step-idle{border:1px solid var(--hair);color:var(--muted)}\n.step-done{background:var(--ok-soft);color:var(--ok);border:1px solid var(--ok)}\n.step-failed{background:var(--err-soft);color:var(--err);border:1px solid var(--err)}\n.step-running{background:var(--running-soft);color:var(--running);border:1.5px solid var(--running)}\n\n/* ── BANNER ────────────────────────────────────────────────────── */\n.banner{\n  padding:14px 18px;border-radius:6px;\n  display:flex;gap:14px;align-items:flex-start;\n}\n.banner-ok{background:var(--ok-soft);border:1px solid var(--ok)}\n.banner-err{background:var(--err-soft);border:1px solid var(--err)}\n.banner-dot{width:8px;height:8px;border-radius:50%;background:currentColor;margin-top:6px;flex-shrink:0}\n.banner-title{font-weight:600;font-size:14px;margin-bottom:2px}\n.banner-body{font-size:13.5px;color:var(--ink-soft)}\n\n/* ── INPUT ─────────────────────────────────────────────────────── */\n.input-wrap{\n  display:flex;align-items:flex-end;gap:10px;\n  border:1px solid var(--hair);background:var(--paper);\n  padding:12px 14px;border-radius:8px;\n}\n.input-wrap textarea{\n  flex:1;resize:none;border:none;outline:none;\n  background:transparent;font-family:var(--f-display);font-size:15px;\n  line-height:1.55;color:var(--ink);\n}\n.send-btn{\n  width:32px;height:32px;border-radius:8px;background:var(--terracotta);\n  color:#fff;border:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;\n}\n.input-disabled{\n  display:flex;align-items:center;gap:10px;\n  border:1px dashed var(--hair);background:var(--hair-soft);\n  padding:12px 14px;border-radius:8px;\n  font-size:13.5px;color:var(--muted-2);font-style:italic;\n}\n\n/* ── SIDEBAR ITEM ──────────────────────────────────────────────── */\n.run-item{\n  padding:12px 20px 12px 18px;border-left:2px solid transparent;\n  border-bottom:1px solid var(--hair-soft);\n}\n.run-item.active{border-left-color:var(--terracotta);background:var(--terracotta-tint)}\n.run-item-title{font-size:13px;font-weight:500;color:var(--ink);line-height:1.35}\n.run-item-time{font-family:var(--f-mono);font-size:10px;letter-spacing:.06em;color:var(--muted);margin-top:4px}\n.run-badge{\n  font-family:var(--f-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;\n  padding:2px 6px;border-radius:999px;\n}\n.run-badge.done{color:var(--ok);border:1px solid var(--ok)}\n.run-badge.failed{color:var(--err);border:1px solid var(--err)}\n\n/* ── CHAT BUBBLE ───────────────────────────────────────────────── */\n.bubble-user{\n  align-self:flex-end;max-width:82%;padding:12px 14px;\n  background:var(--terracotta);color:#fff;border-radius:12px;\n  font-size:14.5px;line-height:1.55;\n}\n.bubble-agent{font-size:14.5px;line-height:1.55;color:var(--ink-soft);max-width:92%}\n.bubble-agent-name{\n  display:flex;align-items:center;gap:6px;margin-bottom:6px;\n}\n.bubble-agent-dot{\n  width:18px;height:18px;border-radius:50%;background:var(--terracotta);\n  display:inline-flex;align-items:center;justify-content:center;\n  color:#fff;font-family:var(--f-mono);font-size:9px;font-weight:700;\n}\n.bubble-system{\n  display:flex;align-items:center;gap:10px;\n}\n.bubble-system-line{flex:1;height:1px;background:var(--hair)}\n.bubble-system-text{font-family:var(--f-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}\n\n/* ── DO/DON'T ──────────────────────────────────────────────────── */\n.do-dont{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--hair);border:1px solid var(--hair);margin-bottom:32px}\n.do-cell{background:var(--paper);padding:24px 28px}\n.do-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}\n.do-pill{\n  font-family:var(--f-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;\n  padding:4px 10px;border-radius:999px;\n}\n.do-pill.do{background:var(--ok-soft);color:var(--ok);border:1px solid var(--ok)}\n.do-pill.dont{background:var(--err-soft);color:var(--err);border:1px solid var(--err)}\n.do-item{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start;font-size:14px;line-height:1.5;color:var(--ink-soft)}\n.do-item::before{content:\"→\";font-family:var(--f-mono);font-size:11px;margin-top:3px;flex-shrink:0}\n.dont-item::before{content:\"✕\";color:var(--err);font-family:var(--f-mono);font-size:11px;margin-top:3px;flex-shrink:0}\n.dont-item{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start;font-size:14px;line-height:1.5;color:var(--ink-soft)}\n\n/* ── VOICE TABLE ───────────────────────────────────────────────── */\n.voice-table{width:100%;border-collapse:collapse;border:1px solid var(--hair);font-size:14px}\n.voice-table th{\n  background:var(--cream);font-family:var(--f-mono);font-size:10px;text-transform:uppercase;\n  letter-spacing:.12em;color:var(--terracotta);padding:12px 16px;text-align:left;\n  border-bottom:1px solid var(--hair);font-weight:600;\n}\n.voice-table td{padding:14px 16px;border-bottom:1px solid var(--hair-soft);vertical-align:top;line-height:1.5}\n.voice-table tr:last-child td{border-bottom:none}\n.voice-table td:first-child{font-weight:500;width:160px;color:var(--ink)}\n.voice-table td.yes{color:var(--ok-soft)}\n.voice-table td.no{color:var(--err-soft)}\n.yes-col{color:var(--ok)}\n.no-col{color:var(--err)}\n.mono-text{font-family:var(--f-mono);font-size:12px;letter-spacing:.04em;color:var(--ink-2)}\n\n/* ── TOKEN TABLE ───────────────────────────────────────────────── */\n.token-table{width:100%;border-collapse:collapse;border:1px solid var(--hair);font-size:13px;font-family:var(--f-mono)}\n.token-table th{\n  background:var(--cream);font-size:10px;text-transform:uppercase;letter-spacing:.12em;\n  color:var(--terracotta);padding:10px 14px;text-align:left;border-bottom:1px solid var(--hair);font-weight:600;\n}\n.token-table td{padding:10px 14px;border-bottom:1px solid var(--hair-soft);vertical-align:middle}\n.token-table tr:last-child td{border-bottom:none}\n.token-swatch{display:inline-block;width:16px;height:16px;border-radius:50%;border:1px solid var(--hair);vertical-align:middle;margin-right:8px}\n.token-var{letter-spacing:.04em;color:var(--terracotta)}\n.token-val{color:var(--muted)}\n.token-use{font-family:var(--f-display);font-size:12px;color:var(--ink-soft);letter-spacing:0}\n\n/* ── CODE BLOCK ────────────────────────────────────────────────── */\n.code{\n  background:var(--ink-soft);color:#f3e8de;\n  font-family:var(--f-mono);font-size:12.5px;line-height:1.7;letter-spacing:.03em;\n  padding:20px 24px;overflow-x:auto;margin:0;border-radius:0;\n}\n.code .kw{color:#c9a77c}\n.code .str{color:#a8d8a8}\n.code .cm{color:#7a8a7a}\n.code .var{color:#88c0d0}\n\n/* ── FOOTER ────────────────────────────────────────────────────── */\n.footer{\n  padding:24px 72px;border-top:1px solid var(--hair);\n  display:flex;justify-content:space-between;align-items:center;\n  font-family:var(--f-mono);font-size:11px;color:var(--muted);\n  text-transform:uppercase;letter-spacing:.1em;\n}\n\n/* ── ANIMATIONS ────────────────────────────────────────────────── */\n@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}\n.pulse{animation:pulse 1.4s ease-in-out infinite}\n\n/* ── SCROLLSPY ─────────────────────────────────────────────────── */\nhtml{scroll-behavior:smooth}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<div class=\"page\">\n\n<!-- ── SIDEBAR NAV ───────────────────────────────────────────── -->\n<nav class=\"nav\">\n  <div class=\"nav-brand\">\n    <div class=\"nav-dot\">S<\u002Fdiv>\n    <div>\n      <div class=\"nav-title\">Sociius<\u002Fdiv>\n      <div class=\"nav-subtitle\">Style Guide · v1<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"nav-section\">\n    <div class=\"nav-section-label\">Foundation<\u002Fdiv>\n    <a class=\"nav-link\" href=\"#principles\">Principles<\u002Fa>\n    <a class=\"nav-link\" href=\"#colors\">Colors<\u002Fa>\n    <a class=\"nav-link\" href=\"#typography\">Typography<\u002Fa>\n    <a class=\"nav-link\" href=\"#spacing\">Spacing<\u002Fa>\n    <a class=\"nav-link\" href=\"#tokens\">CSS Tokens<\u002Fa>\n  <\u002Fdiv>\n\n  <div class=\"nav-section\">\n    <div class=\"nav-section-label\">Components<\u002Fdiv>\n    <a class=\"nav-link\" href=\"#buttons\">Buttons<\u002Fa>\n    <a class=\"nav-link\" href=\"#chips\">Status Chips<\u002Fa>\n    <a class=\"nav-link\" href=\"#eyebrow\">Eyebrow / Tags<\u002Fa>\n    <a class=\"nav-link\" href=\"#banners\">Banners<\u002Fa>\n    <a class=\"nav-link\" href=\"#inputs\">Inputs<\u002Fa>\n    <a class=\"nav-link\" href=\"#steps\">Step Indicators<\u002Fa>\n    <a class=\"nav-link\" href=\"#sidebar\">Sidebar Items<\u002Fa>\n    <a class=\"nav-link\" href=\"#chat\">Chat Bubbles<\u002Fa>\n  <\u002Fdiv>\n\n  <div class=\"nav-section\">\n    <div class=\"nav-section-label\">Brand<\u002Fdiv>\n    <a class=\"nav-link\" href=\"#voice\">Brand Voice<\u002Fa>\n    <a class=\"nav-link\" href=\"#dodont\">Do / Don't<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ── MAIN CONTENT ─────────────────────────────────────────── -->\n<div class=\"main\">\n\n  <!-- HERO -->\n  <header class=\"hero\">\n    <div>\n      <div class=\"hero-label\">Sociius · EIT · Frontend Reference<\u002Fdiv>\n      <h1 class=\"hero-title\">Design system for builders<\u002Fh1>\n      <div class=\"hero-version\">v1 · April 2026 · Applied to Sociius re-skin<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <span class=\"tag-chip\">Style Guide<\u002Fspan>\n      <p class=\"hero-desc\">Everything another frontend team needs to build a UI that looks and feels like Sociius — brand colors, type scale, spacing, interactive components, and copy voice. Derived from the EIT master brand applied to the Sociius lab protocol interface.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- PRINCIPLES -->\n  <section class=\"section\" id=\"principles\">\n    <span class=\"section-tag\">01 · Principles<\u002Fspan>\n    <h2 class=\"section-title\">Editorial, scientific, warm.<\u002Fh2>\n    <p class=\"section-note\">Three adjectives drive every design decision. When in doubt, ask: is this editorial enough? Precise enough? Warm enough?<\u002Fp>\n\n    <div class=\"grid-3\" style=\"margin-bottom:32px\">\n      <div class=\"cell\">\n        <div class=\"cell-label\">01<\u002Fdiv>\n        <div style=\"font-size:18px;font-weight:400;margin-bottom:10px\">Hairlines, not shadows<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.6;color:var(--ink-soft)\">All containment is 1 px stroke — terracotta or grey. No drop shadows, no card blur, no floating layers. Square corners everywhere except small affordances (chips, send button, status dot) which get a small radius.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cell\">\n        <div class=\"cell-label\">02<\u002Fdiv>\n        <div style=\"font-size:18px;font-weight:400;margin-bottom:10px\">Light display, plain body<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.6;color:var(--ink-soft)\">Display sizes use Source Sans 3 Light at 26–40 px with tight leading and slight negative tracking. Body stays Regular at 14–16 px. Medium weight is reserved for labels, buttons, and strong UI text only.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cell\">\n        <div class=\"cell-label\">03<\u002Fdiv>\n        <div style=\"font-size:18px;font-weight:400;margin-bottom:10px\">Terracotta is a signal<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.6;color:var(--ink-soft)\">The brand terracotta (#A96D4B) is used as stroke, label, focus ring, and active indicator — not as a background fill. Large flat terracotta fields are rare and carry real semantic weight when they appear.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid-3\">\n      <div class=\"cell cream\">\n        <div class=\"cell-label\">04<\u002Fdiv>\n        <div style=\"font-size:18px;font-weight:400;margin-bottom:10px\">Mono is a precision voice<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.6;color:var(--ink-soft)\">Source Code Pro is used only for counters, run codes, timestamps, labels, and technical metadata. Never for body copy or headings. Always 9–13 px with .08–.14 em letter-spacing and UPPERCASE.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cell cream\">\n        <div class=\"cell-label\">05<\u002Fdiv>\n        <div style=\"font-size:18px;font-weight:400;margin-bottom:10px\">Status is always visible<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.6;color:var(--ink-soft)\">Every active or historical run has a visible status (Idle / Processing / Running / Done / Failed). Color is never the only indicator — status labels are always present in full.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cell cream\">\n        <div class=\"cell-label\">06<\u002Fdiv>\n        <div style=\"font-size:18px;font-weight:400;margin-bottom:10px\">4-pt grid, always<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.6;color:var(--ink-soft)\">All spacing, sizing, and positioning values are multiples of 4. Common values: 4, 8, 12, 16, 20, 24, 28, 32, 48, 64. Page gutter is 64 px; card padding is 24–28 px.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- COLORS -->\n  <section class=\"section\" id=\"colors\">\n    <span class=\"section-tag\">02 · Colors<\u002Fspan>\n    <h2 class=\"section-title\">Brand palette<\u002Fh2>\n    <p class=\"section-note\">Terracotta is the signature; cream and paper are the canvases; ink and hairline greys carry structure. No gradients anywhere.<\u002Fp>\n\n    <div style=\"font-family:var(--f-mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--terracotta);margin-bottom:12px\">Brand &amp; Surfaces<\u002Fdiv>\n    <div class=\"swatch-grid\" style=\"margin-bottom:32px\">\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#A96D4B\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Terracotta<\u002Fdiv><div class=\"swatch-hex\">#A96D4B<\u002Fdiv><div class=\"swatch-var\">--terracotta<\u002Fdiv><div class=\"swatch-use\">Primary brand — stroke, label, active, send btn<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#8F5A3C\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Terracotta Hover<\u002Fdiv><div class=\"swatch-hex\">#8F5A3C<\u002Fdiv><div class=\"swatch-var\">--terracotta-hover<\u002Fdiv><div class=\"swatch-use\">Hover state for filled terracotta surfaces<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#A17258\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Terracotta Soft<\u002Fdiv><div class=\"swatch-hex\">#A17258<\u002Fdiv><div class=\"swatch-var\">--terracotta-soft<\u002Fdiv><div class=\"swatch-use\">Secondary / subdued terracotta<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:rgba(169,109,75,.08);border:1px solid var(--hair-soft)\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Terracotta Tint<\u002Fdiv><div class=\"swatch-hex\">rgba(169,109,75,.08)<\u002Fdiv><div class=\"swatch-var\">--terracotta-tint<\u002Fdiv><div class=\"swatch-use\">Active sidebar rows, hover fills<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#000\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Ink<\u002Fdiv><div class=\"swatch-hex\">#000000<\u002Fdiv><div class=\"swatch-var\">--ink<\u002Fdiv><div class=\"swatch-use\">Primary text, headings<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#1E1E1E\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Ink Soft<\u002Fdiv><div class=\"swatch-hex\">#1E1E1E<\u002Fdiv><div class=\"swatch-var\">--ink-soft<\u002Fdiv><div class=\"swatch-use\">Body copy, secondary text<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#fff;border:1px solid var(--hair-soft)\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Paper<\u002Fdiv><div class=\"swatch-hex\">#FFFFFF<\u002Fdiv><div class=\"swatch-var\">--paper<\u002Fdiv><div class=\"swatch-use\">Primary card / panel surface<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#F6F4EC\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Cream<\u002Fdiv><div class=\"swatch-hex\">#F6F4EC<\u002Fdiv><div class=\"swatch-var\">--cream<\u002Fdiv><div class=\"swatch-use\">Page background, warm fills<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font-family:var(--f-mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--terracotta);margin-bottom:12px\">Structure &amp; Status<\u002Fdiv>\n    <div class=\"swatch-grid\">\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#FBF9F5\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Cream Deep<\u002Fdiv><div class=\"swatch-hex\">#FBF9F5<\u002Fdiv><div class=\"swatch-var\">--cream-deep<\u002Fdiv><div class=\"swatch-use\">Tab bar, subtle tint<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#F0E9E2\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Stone<\u002Fdiv><div class=\"swatch-hex\">#F0E9E2<\u002Fdiv><div class=\"swatch-var\">--stone<\u002Fdiv><div class=\"swatch-use\">Disabled fills, progress track<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#D7D7D7\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Hairline<\u002Fdiv><div class=\"swatch-hex\">#D7D7D7<\u002Fdiv><div class=\"swatch-var\">--hair<\u002Fdiv><div class=\"swatch-use\">Default 1px borders<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#EEEEEE\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Hair Soft<\u002Fdiv><div class=\"swatch-hex\">#EEEEEE<\u002Fdiv><div class=\"swatch-var\">--hair-soft<\u002Fdiv><div class=\"swatch-use\">Interior dividers, step bars<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#2f7d5f\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">OK / Success<\u002Fdiv><div class=\"swatch-hex\">#2f7d5f<\u002Fdiv><div class=\"swatch-var\">--ok<\u002Fdiv><div class=\"swatch-use\">Done state — chip, step, banner<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#9B2C2C\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Error<\u002Fdiv><div class=\"swatch-hex\">#9B2C2C<\u002Fdiv><div class=\"swatch-var\">--err<\u002Fdiv><div class=\"swatch-use\">Failed state — chip, step, banner<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#51748C\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Running<\u002Fdiv><div class=\"swatch-hex\">#51748C<\u002Fdiv><div class=\"swatch-var\">--running<\u002Fdiv><div class=\"swatch-use\">Processing / in-progress state<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-chip\" style=\"background:#9a8f83\"><\u002Fdiv><div class=\"swatch-info\"><div class=\"swatch-name\">Muted<\u002Fdiv><div class=\"swatch-hex\">#9a8f83<\u002Fdiv><div class=\"swatch-var\">--muted<\u002Fdiv><div class=\"swatch-use\">Secondary text, timestamps, meta<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TYPOGRAPHY -->\n  <section class=\"section\" id=\"typography\">\n    <span class=\"section-tag\">03 · Typography<\u002Fspan>\n    <h2 class=\"section-title\">Source Sans 3 + Source Code Pro<\u002Fh2>\n    <p class=\"section-note\">Source Sans 3 handles everything editorial — Light for display, Regular for body, Medium for labels and buttons. Source Code Pro is a precision voice for counters, run codes, and metadata. Never swap these roles.<\u002Fp>\n\n    <div class=\"type-table\" style=\"margin-bottom:32px\">\n      <div class=\"type-row\">\n        <div class=\"type-meta\"><div class=\"name\">Display<\u002Fdiv><div class=\"spec\">Source Sans 3<br>Light · 32px<br>leading 1.12<br>tracking -.01em<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:var(--f-display);font-weight:300;font-size:32px;line-height:1.12;letter-spacing:-.01em\">PCR amplification of a 500bp fragment<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-row\">\n        <div class=\"type-meta\"><div class=\"name\">H1<\u002Fdiv><div class=\"spec\">Source Sans 3<br>Light · 26px<br>leading 1.15<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:var(--f-display);font-weight:300;font-size:26px;line-height:1.15\">What procedure should we run?<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-row\">\n        <div class=\"type-meta\"><div class=\"name\">H2<\u002Fdiv><div class=\"spec\">Source Sans 3<br>Light · 22px<br>leading 1.2<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:var(--f-display);font-weight:300;font-size:22px;line-height:1.2\">Lab workflows, plainly described<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-row\">\n        <div class=\"type-meta\"><div class=\"name\">Lede<\u002Fdiv><div class=\"spec\">Source Sans 3<br>Regular · 16px<br>leading 1.55<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:var(--f-display);font-weight:400;font-size:16px;line-height:1.55;color:var(--ink-soft)\">Describe a procedure in plain English — Sociius turns it into ordered, validated steps ready to dispatch to the robot.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-row\">\n        <div class=\"type-meta\"><div class=\"name\">Body<\u002Fdiv><div class=\"spec\">Source Sans 3<br>Regular · 14–15px<br>leading 1.55<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:var(--f-display);font-weight:400;font-size:14.5px;line-height:1.55;color:var(--ink-soft)\">Thaw DNA template, primers (10 µM each) and 2× PCR master mix on ice. In a 0.2 mL tube combine 25 µL master mix, 1 µL each primer, 1 µL template (~50 ng), 22 µL nuclease-free water.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-row\">\n        <div class=\"type-meta\"><div class=\"name\">Label / Button<\u002Fdiv><div class=\"spec\">Source Sans 3<br>Medium · 13–14px<br>tracking .03em<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:var(--f-display);font-weight:500;font-size:14px;letter-spacing:.03em\">Reuse Protocol · Edit &amp; Regenerate · Run on Flex-01<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-row\">\n        <div class=\"type-meta\"><div class=\"name\">Mono Label<\u002Fdiv><div class=\"spec\">Source Code Pro<br>SemiBold · 10–12px<br>UPPERCASE · .1em<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:var(--f-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--terracotta)\">Run History · Chat with Sociius · R-4821<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-row\">\n        <div class=\"type-meta\"><div class=\"name\">Mono Data<\u002Fdiv><div class=\"spec\">Source Code Pro<br>Regular · 10–12px<br>tracking .06em<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:var(--f-mono);font-size:11px;letter-spacing:.06em;color:var(--muted)\">Today · 14:32 &nbsp;·&nbsp; 04 / 09 &nbsp;·&nbsp; 00:12:41 elapsed<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid-2\">\n      <div class=\"cell\">\n        <div class=\"cell-label\">Google Fonts import<\u002Fdiv>\n        <pre class=\"code\">&lt;<span class=\"kw\">link<\u002Fspan> href=<span class=\"str\">\"https://fonts.googleapis.com/css2?\n  family=Source+Sans+3:ital,wght@\n    0,200..900;1,300..600\n  &amp;family=Source+Code+Pro:wght@\n    400;500;600;700\n  &amp;display=swap\"<\u002Fspan> rel=<span class=\"str\">\"stylesheet\"<\u002Fspan>&gt;<\u002Fpre>\n      <\u002Fdiv>\n      <div class=\"cell\">\n        <div class=\"cell-label\">CSS font stacks<\u002Fdiv>\n        <pre class=\"code\"><span class=\"var\">--f-display<\u002Fspan>: <span class=\"str\">\"Source Sans 3\"<\u002Fspan>,\n             <span class=\"str\">\"Helvetica Neue\"<\u002Fspan>,\n             system-ui, sans-serif;\n\n<span class=\"var\">--f-mono<\u002Fspan>:    <span class=\"str\">\"Source Code Pro\"<\u002Fspan>,\n             <span class=\"str\">\"SF Mono\"<\u002Fspan>,\n             ui-monospace, monospace;<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SPACING -->\n  <section class=\"section\" id=\"spacing\">\n    <span class=\"section-tag\">04 · Spacing<\u002Fspan>\n    <h2 class=\"section-title\">4-point grid<\u002Fh2>\n    <p class=\"section-note\">Every margin, padding, and gap value is a multiple of 4. Common application: section padding 64 px, card inner 24–28 px, stack gaps 8/16/24, inline gaps 8.<\u002Fp>\n\n    <div class=\"spacing-grid\" style=\"margin-bottom:32px\">\n      <div class=\"spacing-cell\"><div class=\"spacing-bar\" style=\"width:4px\"><\u002Fdiv><div class=\"spacing-val\">4<\u002Fdiv><div class=\"spacing-tag\">micro<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-cell\"><div class=\"spacing-bar\" style=\"width:8px\"><\u002Fdiv><div class=\"spacing-val\">8<\u002Fdiv><div class=\"spacing-tag\">inline<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-cell\"><div class=\"spacing-bar\" style=\"width:12px\"><\u002Fdiv><div class=\"spacing-val\">12<\u002Fdiv><div class=\"spacing-tag\">input pad<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-cell\"><div class=\"spacing-bar\" style=\"width:16px\"><\u002Fdiv><div class=\"spacing-val\">16<\u002Fdiv><div class=\"spacing-tag\">stack<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-cell\"><div class=\"spacing-bar\" style=\"width:24px\"><\u002Fdiv><div class=\"spacing-val\">24<\u002Fdiv><div class=\"spacing-tag\">card inner<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-cell\"><div class=\"spacing-bar\" style=\"width:32px\"><\u002Fdiv><div class=\"spacing-val\">32<\u002Fdiv><div class=\"spacing-tag\">block<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-cell\"><div class=\"spacing-bar\" style=\"width:48px\"><\u002Fdiv><div class=\"spacing-val\">48<\u002Fdiv><div class=\"spacing-tag\">section y<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-cell\"><div class=\"spacing-bar\" style=\"width:64px\"><\u002Fdiv><div class=\"spacing-val\">64<\u002Fdiv><div class=\"spacing-tag\">page gutter<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font-family:var(--f-mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--terracotta);margin-bottom:12px\">Corner radius scale<\u002Fdiv>\n    <div class=\"grid-4\" style=\"margin-bottom:32px\">\n      <div class=\"cell-sm\"><div class=\"cell-label\">None (0px)<\u002Fdiv><div style=\"width:48px;height:48px;border:1px solid var(--hair);border-radius:0;background:var(--cream)\"><\u002Fdiv><div class=\"cell-note\">Section containers, type-scale frames<\u002Fdiv><\u002Fdiv>\n      <div class=\"cell-sm\"><div class=\"cell-label\">Soft (6px)<\u002Fdiv><div style=\"width:48px;height:48px;border:1px solid var(--hair);border-radius:6px;background:var(--cream)\"><\u002Fdiv><div class=\"cell-note\">Buttons, banners, inputs, small chips<\u002Fdiv><\u002Fdiv>\n      <div class=\"cell-sm\"><div class=\"cell-label\">Card (10px)<\u002Fdiv><div style=\"width:48px;height:48px;border:1px solid var(--hair);border-radius:10px;background:var(--cream)\"><\u002Fdiv><div class=\"cell-note\">Panels, main protocol card<\u002Fdiv><\u002Fdiv>\n      <div class=\"cell-sm\"><div class=\"cell-label\">Pill (999px)<\u002Fdiv><div style=\"width:48px;height:48px;border:1px solid var(--hair);border-radius:999px;background:var(--cream)\"><\u002Fdiv><div class=\"cell-note\">Status chips, logo dot, filter tabs<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CSS TOKENS -->\n  <section class=\"section\" id=\"tokens\">\n    <span class=\"section-tag\">05 · CSS Tokens<\u002Fspan>\n    <h2 class=\"section-title\">Copy these into your :root<\u002Fh2>\n    <p class=\"section-note\">All components reference these custom properties. Define them once on :root and never hardcode hex values anywhere else in your CSS.<\u002Fp>\n\n    <pre class=\"code\" style=\"margin-bottom:32px;border:1px solid var(--hair)\"><span class=\"cm\">/* paste this block into your global stylesheet */<\u002Fspan>\n<span class=\"kw\">:root<\u002Fspan> {\n  <span class=\"cm\">/* brand */<\u002Fspan>\n  <span class=\"var\">--terracotta<\u002Fspan>:       <span class=\"str\">#A96D4B<\u002Fspan>;\n  <span class=\"var\">--terracotta-hover<\u002Fspan>: <span class=\"str\">#8F5A3C<\u002Fspan>;\n  <span class=\"var\">--terracotta-soft<\u002Fspan>:  <span class=\"str\">#A17258<\u002Fspan>;\n  <span class=\"var\">--terracotta-tint<\u002Fspan>:  <span class=\"str\">rgba(169,109,75,.08)<\u002Fspan>;\n\n  <span class=\"cm\">/* ink */<\u002Fspan>\n  <span class=\"var\">--ink<\u002Fspan>:       <span class=\"str\">#000<\u002Fspan>;\n  <span class=\"var\">--ink-soft<\u002Fspan>:  <span class=\"str\">#1E1E1E<\u002Fspan>;\n  <span class=\"var\">--ink-2<\u002Fspan>:     <span class=\"str\">#3a3a3a<\u002Fspan>;\n\n  <span class=\"cm\">/* surfaces */<\u002Fspan>\n  <span class=\"var\">--paper<\u002Fspan>:      <span class=\"str\">#fff<\u002Fspan>;\n  <span class=\"var\">--cream<\u002Fspan>:      <span class=\"str\">#F6F4EC<\u002Fspan>;\n  <span class=\"var\">--cream-deep<\u002Fspan>: <span class=\"str\">#FBF9F5<\u002Fspan>;\n  <span class=\"var\">--stone<\u002Fspan>:      <span class=\"str\">#F0E9E2<\u002Fspan>;\n\n  <span class=\"cm\">/* borders */<\u002Fspan>\n  <span class=\"var\">--hair<\u002Fspan>:      <span class=\"str\">#D7D7D7<\u002Fspan>;\n  <span class=\"var\">--hair-soft<\u002Fspan>: <span class=\"str\">#EEEEEE<\u002Fspan>;\n  <span class=\"var\">--muted<\u002Fspan>:     <span class=\"str\">#9a8f83<\u002Fspan>;\n  <span class=\"var\">--muted-2<\u002Fspan>:   <span class=\"str\">#AAAAAA<\u002Fspan>;\n\n  <span class=\"cm\">/* status */<\u002Fspan>\n  <span class=\"var\">--ok<\u002Fspan>:           <span class=\"str\">#2f7d5f<\u002Fspan>;\n  <span class=\"var\">--ok-soft<\u002Fspan>:      <span class=\"str\">#E8F2EC<\u002Fspan>;\n  <span class=\"var\">--err<\u002Fspan>:          <span class=\"str\">#9B2C2C<\u002Fspan>;\n  <span class=\"var\">--err-soft<\u002Fspan>:     <span class=\"str\">#F7E7E7<\u002Fspan>;\n  <span class=\"var\">--running<\u002Fspan>:      <span class=\"str\">#51748C<\u002Fspan>;\n  <span class=\"var\">--running-soft<\u002Fspan>: <span class=\"str\">#E4ECF2<\u002Fspan>;\n\n  <span class=\"cm\">/* typography */<\u002Fspan>\n  <span class=\"var\">--f-display<\u002Fspan>: <span class=\"str\">\"Source Sans 3\"<\u002Fspan>, <span class=\"str\">\"Helvetica Neue\"<\u002Fspan>, system-ui, sans-serif;\n  <span class=\"var\">--f-mono<\u002Fspan>:    <span class=\"str\">\"Source Code Pro\"<\u002Fspan>, <span class=\"str\">\"SF Mono\"<\u002Fspan>, ui-monospace, monospace;\n}<\u002Fpre>\n  <\u002Fsection>\n\n  <!-- BUTTONS -->\n  <section class=\"section\" id=\"buttons\">\n    <span class=\"section-tag\">06 · Components<\u002Fspan>\n    <h2 class=\"section-title\">Buttons<\u002Fh2>\n    <p class=\"section-note\">Four variants. Height 36–40 px; small variant 28–32 px. Radius 6px (soft). Font: Source Sans 3 Medium 14px, tracking .03em. Never use border-radius &gt; 6px on buttons.<\u002Fp>\n\n    <div class=\"comp-card\">\n      <div class=\"comp-title\">Primary<\u002Fdiv>\n      <div class=\"comp-hint\">Filled terracotta · Used for single primary action per view<\u002Fdiv>\n      <div class=\"comp-demo\">\n        <button class=\"btn btn-primary\">Run on Flex-01<\u002Fbutton>\n        <button class=\"btn btn-primary btn-sm\">Run on Flex-01<\u002Fbutton>\n        <button class=\"btn btn-primary btn-disabled\" disabled=\"\">Disabled<\u002Fbutton>\n      <\u002Fdiv>\n      <pre class=\"code\" style=\"margin-top:16px\">&lt;<span class=\"kw\">button<\u002Fspan> class=<span class=\"str\">\"btn btn-primary\"<\u002Fspan>&gt;Run on Flex-01&lt;/<span class=\"kw\">button<\u002Fspan>&gt;\n\n<span class=\"cm\">/* CSS */<\u002Fspan>\n<span class=\"var\">background<\u002Fspan>: var(<span class=\"str\">--terracotta<\u002Fspan>); <span class=\"var\">color<\u002Fspan>: #fff;\n<span class=\"var\">border<\u002Fspan>: 1px solid var(<span class=\"str\">--terracotta<\u002Fspan>);\n<span class=\"var\">font-weight<\u002Fspan>: 500; <span class=\"var\">border-radius<\u002Fspan>: 6px;\n<span class=\"cm\">/* hover: background → var(--terracotta-hover) */<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n\n    <div class=\"comp-card\">\n      <div class=\"comp-title\">Secondary<\u002Fdiv>\n      <div class=\"comp-hint\">Transparent · terracotta border · for secondary actions alongside Primary<\u002Fdiv>\n      <div class=\"comp-demo\">\n        <button class=\"btn btn-secondary\">Edit &amp; Regenerate<\u002Fbutton>\n        <button class=\"btn btn-secondary btn-sm\">Edit &amp; Regenerate<\u002Fbutton>\n        <button class=\"btn btn-secondary btn-disabled\" disabled=\"\">Disabled<\u002Fbutton>\n      <\u002Fdiv>\n      <pre class=\"code\" style=\"margin-top:16px\"><span class=\"var\">background<\u002Fspan>: transparent; <span class=\"var\">color<\u002Fspan>: var(<span class=\"str\">--ink<\u002Fspan>);\n<span class=\"var\">border<\u002Fspan>: 1px solid var(<span class=\"str\">--terracotta<\u002Fspan>);\n<span class=\"cm\">/* hover: background → var(--terracotta-tint) */<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n\n    <div class=\"comp-card\">\n      <div class=\"comp-title\">Ghost<\u002Fdiv>\n      <div class=\"comp-hint\">Hairline border · for tertiary or utility actions (Pause, Edit, Reuse)<\u002Fdiv>\n      <div class=\"comp-demo\">\n        <button class=\"btn btn-ghost\">Pause run<\u002Fbutton>\n        <button class=\"btn btn-ghost btn-sm\">Abort<\u002Fbutton>\n        <button class=\"btn btn-ghost\" style=\"display:inline-flex;align-items:center;gap:6px\">\n          <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M3 21l3.5-1 11.5-11.5a2.1 2.1 0 0 0-3-3L3.5 17 3 21z\"><\u002Fpath><\u002Fsvg>\n          Edit\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <pre class=\"code\" style=\"margin-top:16px\"><span class=\"var\">background<\u002Fspan>: transparent; <span class=\"var\">color<\u002Fspan>: var(<span class=\"str\">--ink-soft<\u002Fspan>);\n<span class=\"var\">border<\u002Fspan>: 1px solid var(<span class=\"str\">--hair<\u002Fspan>);\n<span class=\"cm\">/* hover: background → var(--cream) */<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n\n    <div class=\"comp-card\">\n      <div class=\"comp-title\">Link<\u002Fdiv>\n      <div class=\"comp-hint\">No box border · bottom underline only · for inline text actions<\u002Fdiv>\n      <div class=\"comp-demo\">\n        <button class=\"btn btn-link\">Deep link<\u002Fbutton>\n        <button class=\"btn btn-link\">New procedure<\u002Fbutton>\n      <\u002Fdiv>\n      <pre class=\"code\" style=\"margin-top:16px\"><span class=\"var\">background<\u002Fspan>: transparent; <span class=\"var\">color<\u002Fspan>: var(<span class=\"str\">--terracotta<\u002Fspan>);\n<span class=\"var\">border<\u002Fspan>: none; <span class=\"var\">border-bottom<\u002Fspan>: 1px solid var(<span class=\"str\">--terracotta<\u002Fspan>);\n<span class=\"var\">border-radius<\u002Fspan>: 0; <span class=\"var\">padding<\u002Fspan>: 6px 0;<\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STATUS CHIPS -->\n  <section class=\"section\" id=\"chips\">\n    <span class=\"section-tag\">07 · Status Chips<\u002Fspan>\n    <h2 class=\"section-title\">Run states<\u002Fh2>\n    <p class=\"section-note\">Five states. Always pill-shaped. Font: Source Sans 3 Medium 11px, tracking .08em, UPPERCASE. Never use color alone — always show the text label too. Running gets a pulsing dot.<\u002Fp>\n\n    <div class=\"comp-card\">\n      <div class=\"comp-title\">All states<\u002Fdiv>\n      <div class=\"comp-hint\">Use in tab bar, sidebar list items, and run history rows<\u002Fdiv>\n      <div class=\"comp-demo\" style=\"gap:16px\">\n        <span class=\"chip chip-idle\">Idle<\u002Fspan>\n        <span class=\"chip chip-running\">\n          <span class=\"chip-dot pulse\"><\u002Fspan>Processing\n        <\u002Fspan>\n        <span class=\"chip chip-running\">\n          <span class=\"chip-dot pulse\"><\u002Fspan>Running\n        <\u002Fspan>\n        <span class=\"chip chip-done\">Done<\u002Fspan>\n        <span class=\"chip chip-failed\">Failed<\u002Fspan>\n      <\u002Fdiv>\n      <pre class=\"code\" style=\"margin-top:16px\"><span class=\"cm\">/* Idle */<\u002Fspan>    <span class=\"var\">color<\u002Fspan>: var(<span class=\"str\">--muted<\u002Fspan>); <span class=\"var\">border<\u002Fspan>: 1px solid var(<span class=\"str\">--hair<\u002Fspan>);\n<span class=\"cm\">/* Running */<\u002Fspan> <span class=\"var\">color<\u002Fspan>: var(<span class=\"str\">--running<\u002Fspan>); <span class=\"var\">bg<\u002Fspan>: var(<span class=\"str\">--running-soft<\u002Fspan>); <span class=\"var\">border<\u002Fspan>: var(<span class=\"str\">--running<\u002Fspan>);\n<span class=\"cm\">/* Done */<\u002Fspan>    <span class=\"var\">color<\u002Fspan>: var(<span class=\"str\">--ok<\u002Fspan>); <span class=\"var\">bg<\u002Fspan>: var(<span class=\"str\">--ok-soft<\u002Fspan>); <span class=\"var\">border<\u002Fspan>: var(<span class=\"str\">--ok<\u002Fspan>);\n<span class=\"cm\">/* Failed */<\u002Fspan>  <span class=\"var\">color<\u002Fspan>: var(<span class=\"str\">--err<\u002Fspan>); <span class=\"var\">bg<\u002Fspan>: var(<span class=\"str\">--err-soft<\u002Fspan>); <span class=\"var\">border<\u002Fspan>: var(<span class=\"str\">--err<\u002Fspan>);<\u002Fpre>\n    <\u002Fdiv>\n\n    <div class=\"comp-card\" style=\"margin-top:1px\">\n      <div class=\"comp-title\">Mini badge (sidebar)<\u002Fdiv>\n      <div class=\"comp-hint\">9px mono · uppercase · pill border only (no fill)<\u002Fdiv>\n      <div class=\"comp-demo\">\n        <span class=\"run-badge done\">done<\u002Fspan>\n        <span class=\"run-badge failed\">failed<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- EYEBROW / TAGS -->\n  <section class=\"section\" id=\"eyebrow\">\n    <span class=\"section-tag\">08 · Eyebrow &amp; Tags<\u002Fspan>\n    <h2 class=\"section-title\">Labels &amp; section markers<\u002Fh2>\n    <p class=\"section-note\">Two related patterns: the eyebrow mono label (no border, just terracotta mono text) and the tagline chip (boxed, uppercase). Both signal context without competing with body copy.<\u002Fp>\n\n    <div class=\"comp-card\">\n      <div class=\"comp-title\">Eyebrow label<\u002Fdiv>\n      <div class=\"comp-hint\">Source Code Pro · SemiBold · 11px · .12em · UPPERCASE · terracotta<\u002Fdiv>\n      <div class=\"comp-demo col\">\n        <span class=\"eyebrow\">Run · R-4821<\u002Fspan>\n        <span class=\"eyebrow\">Protocol workspace<\u002Fspan>\n        <span class=\"eyebrow\" style=\"color:var(--muted)\">Recent templates<\u002Fspan>\n      <\u002Fdiv>\n      <pre class=\"code\" style=\"margin-top:16px\"><span class=\"var\">font-family<\u002Fspan>: var(<span class=\"str\">--f-mono<\u002Fspan>);\n<span class=\"var\">font-size<\u002Fspan>: 11px; <span class=\"var\">font-weight<\u002Fspan>: 600;\n<span class=\"var\">letter-spacing<\u002Fspan>: .12em; <span class=\"var\">text-transform<\u002Fspan>: uppercase;\n<span class=\"var\">color<\u002Fspan>: var(<span class=\"str\">--terracotta<\u002Fspan>); <span class=\"cm\">/* or var(--muted) for subdued */<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n\n    <div class=\"comp-card\" style=\"margin-top:1px\">\n      <div class=\"comp-title\">Tagline chip<\u002Fdiv>\n      <div class=\"comp-hint\">1px terracotta border · 12px · Medium · .06em · UPPERCASE<\u002Fdiv>\n      <div class=\"comp-demo\">\n        <span class=\"tag-chip\">Design system<\u002Fspan>\n        <span class=\"tag-chip\">Lab protocols<\u002Fspan>\n        <span class=\"tag-chip filled\">Active<\u002Fspan>\n      <\u002Fdiv>\n      <pre class=\"code\" style=\"margin-top:16px\"><span class=\"var\">border<\u002Fspan>: 1px solid var(<span class=\"str\">--terracotta<\u002Fspan>);\n<span class=\"var\">color<\u002Fspan>: var(<span class=\"str\">--terracotta<\u002Fspan>); <span class=\"var\">font-size<\u002Fspan>: 12px;\n<span class=\"var\">font-weight<\u002Fspan>: 500; <span class=\"var\">letter-spacing<\u002Fspan>: .06em; <span class=\"var\">text-transform<\u002Fspan>: uppercase;\n<span class=\"cm\">/* .filled: background → var(--terracotta); color → #fff */<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- BANNERS -->\n  <section class=\"section\" id=\"banners\">\n    <span class=\"section-tag\">09 · Banners<\u002Fspan>\n    <h2 class=\"section-title\">Inline run feedback<\u002Fh2>\n    <p class=\"section-note\">Banners appear inside the protocol panel directly below the header — never as toasts or overlays. Two tones: success (ok) and error (err). Always include a dot indicator + title + one-line explanation.<\u002Fp>\n\n    <div class=\"comp-card\">\n      <div class=\"comp-demo col\">\n        <div class=\"banner banner-ok\" style=\"color:var(--ok);width:100%\">\n          <div class=\"banner-dot\"><\u002Fdiv>\n          <div>\n            <div class=\"banner-title\">Run complete<\u002Fdiv>\n            <div class=\"banner-body\">9 of 9 steps executed successfully. Results saved to run history.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"banner banner-err\" style=\"color:var(--err);width:100%;margin-top:12px\">\n          <div class=\"banner-dot\"><\u002Fdiv>\n          <div>\n            <div class=\"banner-title\">Run halted at step 04<\u002Fdiv>\n            <div class=\"banner-body\">Pipette tip collision detected. Robot returned to safe state; deck has been paused for inspection.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <pre class=\"code\" style=\"margin-top:16px\"><span class=\"cm\">/* ok banner */<\u002Fspan>\n<span class=\"var\">background<\u002Fspan>: var(<span class=\"str\">--ok-soft<\u002Fspan>); <span class=\"var\">border<\u002Fspan>: 1px solid var(<span class=\"str\">--ok<\u002Fspan>);\n\n<span class=\"cm\">/* err banner */<\u002Fspan>\n<span class=\"var\">background<\u002Fspan>: var(<span class=\"str\">--err-soft<\u002Fspan>); <span class=\"var\">border<\u002Fspan>: 1px solid var(<span class=\"str\">--err<\u002Fspan>);<\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- INPUTS -->\n  <section class=\"section\" id=\"inputs\">\n    <span class=\"section-tag\">10 · Inputs<\u002Fspan>\n    <h2 class=\"section-title\">Chat &amp; text input<\u002Fh2>\n    <p class=\"section-note\">The primary input is a multi-line textarea in a hairline container. Focus shifts the border to terracotta. The send button is a 32×32 px terracotta square with up-arrow icon. Disabled state swaps to a dashed lock treatment.<\u002Fp>\n\n    <div class=\"comp-card\">\n      <div class=\"comp-title\">Active<\u002Fdiv>\n      <div class=\"comp-hint\">Hairline border · terracotta on focus · radius 8px<\u002Fdiv>\n      <div class=\"input-wrap\" style=\"max-width:480px\">\n        <textarea rows=\"2\" placeholder=\"Describe a lab procedure in plain English…\" style=\"flex:1;resize:none;border:none;outline:none;background:transparent;font-family:var(--f-display);font-size:15px;line-height:1.55;color:var(--ink)\"><\u002Ftextarea>\n        <button class=\"send-btn\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><path d=\"M12 19V5M6 11l6-6 6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <pre class=\"code\" style=\"margin-top:16px\"><span class=\"var\">border<\u002Fspan>: 1px solid var(<span class=\"str\">--hair<\u002Fspan>); <span class=\"var\">border-radius<\u002Fspan>: 8px;\n<span class=\"cm\">/* :focus-within: border-color → var(--terracotta) */<\u002Fspan>\n<span class=\"cm\">/* send btn: 32×32 · background var(--terracotta) · radius 8px */<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n\n    <div class=\"comp-card\" style=\"margin-top:1px\">\n      <div class=\"comp-title\">Disabled / Locked<\u002Fdiv>\n      <div class=\"comp-hint\">Dashed border · hair-soft fill · lock icon · italic placeholder<\u002Fdiv>\n      <div class=\"input-disabled\" style=\"max-width:480px\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--muted-2)\" stroke-width=\"1.8\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n        Robot is running — chat locked\n      <\u002Fdiv>\n      <pre class=\"code\" style=\"margin-top:16px\"><span class=\"var\">border<\u002Fspan>: 1px dashed var(<span class=\"str\">--hair<\u002Fspan>);\n<span class=\"var\">background<\u002Fspan>: var(<span class=\"str\">--hair-soft<\u002Fspan>);\n<span class=\"var\">color<\u002Fspan>: var(<span class=\"str\">--muted-2<\u002Fspan>); <span class=\"var\">font-style<\u002Fspan>: italic;<\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STEP INDICATORS -->\n  <section class=\"section\" id=\"steps\">\n    <span class=\"section-tag\">11 · Step Indicators<\u002Fspan>\n    <h2 class=\"section-title\">Protocol step list<\u002Fh2>\n    <p class=\"section-note\">Protocol steps use a left accent bar + numbered circle. The bar color maps to state. Circles are 28×28 px pill. Running circles get a gentle ring-pulse animation.<\u002Fp>\n\n    <div class=\"comp-card\">\n      <div style=\"max-width:560px;display:flex;flex-direction:column\">\n        <!-- step done -->\n        <div style=\"display:flex;gap:16px;padding:14px 4px 14px 16px;border-left:2px solid var(--ok);border-bottom:1px solid var(--hair-soft)\">\n          <span class=\"step-dot step-done\">\n            <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><path d=\"M5 13l4 4L19 7\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n          <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:var(--ink-soft)\">Thaw DNA template, primers (10 µM each) and 2× PCR master mix on ice.<\u002Fp>\n        <\u002Fdiv>\n        <!-- step running -->\n        <div style=\"display:flex;gap:16px;padding:14px 4px 14px 16px;border-left:2px solid var(--running);border-bottom:1px solid var(--hair-soft)\">\n          <span class=\"step-dot step-running\">04<\u002Fspan>\n          <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:var(--ink-soft)\">Load into thermocycler and run: 95 °C for 3 min.<\u002Fp>\n        <\u002Fdiv>\n        <!-- step failed -->\n        <div style=\"display:flex;gap:16px;padding:14px 4px 14px 16px;border-left:2px solid var(--err);border-bottom:1px solid var(--hair-soft)\">\n          <span class=\"step-dot step-failed\">\n            <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n          <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:var(--ink-soft)\">30 cycles — 95 °C 30 s · 58 °C 30 s · 72 °C 45 s.<\u002Fp>\n        <\u002Fdiv>\n        <!-- step idle -->\n        <div style=\"display:flex;gap:16px;padding:14px 4px 14px 16px;border-left:2px solid var(--hair-soft)\">\n          <span class=\"step-dot step-idle\">05<\u002Fspan>\n          <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:var(--ink-soft)\">Final extension 72 °C for 5 min, hold at 4 °C.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <pre class=\"code\" style=\"margin-top:16px\"><span class=\"cm\">/* bar color maps to state */<\u002Fspan>\n<span class=\"var\">border-left<\u002Fspan>: 2px solid var(<span class=\"str\">--ok<\u002Fspan>);      <span class=\"cm\">/* done */<\u002Fspan>\n<span class=\"var\">border-left<\u002Fspan>: 2px solid var(<span class=\"str\">--running<\u002Fspan>); <span class=\"cm\">/* running */<\u002Fspan>\n<span class=\"var\">border-left<\u002Fspan>: 2px solid var(<span class=\"str\">--err<\u002Fspan>);      <span class=\"cm\">/* failed */<\u002Fspan>\n<span class=\"var\">border-left<\u002Fspan>: 2px solid var(<span class=\"str\">--hair-soft<\u002Fspan>);<span class=\"cm\">/* idle */<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SIDEBAR ITEMS -->\n  <section class=\"section\" id=\"sidebar\">\n    <span class=\"section-tag\">12 · Sidebar Items<\u002Fspan>\n    <h2 class=\"section-title\">Run history rows<\u002Fh2>\n    <p class=\"section-note\">Run list items use a 2px left accent for the active item in terracotta. Timestamps are mono 10px. Status is a mini pill badge. Background is --cream for the sidebar panel.<\u002Fp>\n\n    <div class=\"comp-card\" style=\"padding:0;max-width:320px\">\n      <div class=\"run-item active\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:8px\">\n          <span class=\"run-item-title\">PCR amplification of a 500bp fragment<\u002Fspan>\n          <span class=\"run-badge done\">done<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"run-item-time\">Today · 14:32<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"run-item\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:8px\">\n          <span class=\"run-item-title\">Restriction digest with EcoRI / BamHI<\u002Fspan>\n          <span class=\"run-badge failed\">failed<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"run-item-time\">Yesterday · 17:21<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"run-item\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:8px\">\n          <span class=\"run-item-title\">Gibson assembly, 3-fragment insert<\u002Fspan>\n          <span class=\"run-badge done\">done<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"run-item-time\">22 Apr · 09:48<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CHAT BUBBLES -->\n  <section class=\"section\" id=\"chat\">\n    <span class=\"section-tag\">13 · Chat Bubbles<\u002Fspan>\n    <h2 class=\"section-title\">Conversation thread<\u002Fh2>\n    <p class=\"section-note\">Three roles: user (right-aligned, terracotta fill), agent (left-aligned, no fill), and system (centered divider line). Chat copy is conversational and plain — no markdown formatting rendered in bubbles.<\u002Fp>\n\n    <div class=\"comp-card\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;max-width:520px\">\n        <div class=\"bubble-system\">\n          <div class=\"bubble-system-line\"><\u002Fdiv>\n          <div class=\"bubble-system-text\">New procedure · 22 Apr<\u002Fdiv>\n          <div class=\"bubble-system-line\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:flex-end\">\n          <div class=\"bubble-user\">Run a PCR amplification of a 500bp fragment. Use a standard 50 µL reaction with Phusion polymerase, and include a gel verification step.<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"bubble-agent-name\">\n            <span class=\"bubble-agent-dot\">S<\u002Fspan>\n            <span class=\"eyebrow\" style=\"font-size:10px\">Sociius<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"bubble-agent\">Generated a 9-step protocol. Includes thermocycler program with a 30-cycle 95/58/72 schedule, gel verification at the end, and cleanup via spin column.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <pre class=\"code\" style=\"margin-top:20px\"><span class=\"cm\">/* User: right-align, terracotta */<\u002Fspan>\n<span class=\"var\">background<\u002Fspan>: var(<span class=\"str\">--terracotta<\u002Fspan>); <span class=\"var\">color<\u002Fspan>: #fff;\n<span class=\"var\">border-radius<\u002Fspan>: 12px; <span class=\"var\">padding<\u002Fspan>: 12px 14px;\n\n<span class=\"cm\">/* Agent: no fill, ink-soft text */<\u002Fspan>\n<span class=\"var\">color<\u002Fspan>: var(<span class=\"str\">--ink-soft<\u002Fspan>); <span class=\"var\">max-width<\u002Fspan>: 92%;\n\n<span class=\"cm\">/* System divider: flex line + mono label + flex line */<\u002Fspan>\n<span class=\"var\">font-family<\u002Fspan>: var(<span class=\"str\">--f-mono<\u002Fspan>); <span class=\"var\">font-size<\u002Fspan>: 10px;\n<span class=\"var\">letter-spacing<\u002Fspan>: .14em; <span class=\"var\">text-transform<\u002Fspan>: uppercase;\n<span class=\"var\">color<\u002Fspan>: var(<span class=\"str\">--muted<\u002Fspan>);<\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- BRAND VOICE -->\n  <section class=\"section\" id=\"voice\">\n    <span class=\"section-tag\">14 · Brand Voice<\u002Fspan>\n    <h2 class=\"section-title\">How Sociius speaks<\u002Fh2>\n    <p class=\"section-note\">Sociius is a precision tool. The copy is direct, factual, and calm — never chatty or promotional. It acknowledges errors without drama, and describes success without celebration.<\u002Fp>\n\n    <table class=\"voice-table\" style=\"margin-bottom:32px\">\n      <thead>\n        <tr><th>Attribute<\u002Fth><th>What it means<\u002Fth><th class=\"yes-col\">✓ Write this<\u002Fth><th class=\"no-col\">✕ Not this<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td>Direct<\u002Ftd>\n          <td>State what happened. Skip preamble.<\u002Ftd>\n          <td class=\"yes-col\"><span class=\"mono-text\">9 of 9 steps executed successfully.<\u002Fspan><\u002Ftd>\n          <td class=\"no-col\"><span class=\"mono-text\">Great news! Your protocol has completed without any issues!<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Factual<\u002Ftd>\n          <td>Include the specific data. No vague phrases.<\u002Ftd>\n          <td class=\"yes-col\"><span class=\"mono-text\">Run halted at step 04. Pipette tip collision detected.<\u002Fspan><\u002Ftd>\n          <td class=\"no-col\"><span class=\"mono-text\">Something went wrong. Please check the robot.<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Calm<\u002Ftd>\n          <td>No exclamation marks. No urgency theater.<\u002Ftd>\n          <td class=\"yes-col\"><span class=\"mono-text\">Robot returned to safe state; deck has been paused for inspection.<\u002Fspan><\u002Ftd>\n          <td class=\"no-col\"><span class=\"mono-text\">⚠️ ALERT! Execution stopped! Immediate action required!<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Instructive<\u002Ftd>\n          <td>After an error, say what the user can do next.<\u002Ftd>\n          <td class=\"yes-col\"><span class=\"mono-text\">Inspect the deck, then reuse the protocol or tweak and regenerate.<\u002Fspan><\u002Ftd>\n          <td class=\"no-col\"><span class=\"mono-text\">An error occurred.<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Scientific<\u002Ftd>\n          <td>Use correct units and notation. Never simplify at the cost of accuracy.<\u002Ftd>\n          <td class=\"yes-col\"><span class=\"mono-text\">95 °C 30 s · 58 °C 30 s · 72 °C 45 s<\u002Fspan><\u002Ftd>\n          <td class=\"no-col\"><span class=\"mono-text\">high temp, medium temp, then final extension<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Terse<\u002Ftd>\n          <td>UI labels are short. Cut every word that isn't doing work.<\u002Ftd>\n          <td class=\"yes-col\"><span class=\"mono-text\">Reuse Protocol · Edit &amp; Regenerate · New procedure<\u002Fspan><\u002Ftd>\n          <td class=\"no-col\"><span class=\"mono-text\">Click here to reuse this protocol · Start editing and generate new version<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div style=\"font-family:var(--f-mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--terracotta);margin-bottom:12px\">Copy patterns by surface<\u002Fdiv>\n    <table class=\"voice-table\">\n      <thead><tr><th>Surface<\u002Fth><th>Pattern<\u002Fth><th>Example<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td>Eyebrow / section label<\u002Ftd><td>Mono · UPPERCASE · no punctuation<\u002Ftd><td class=\"mono-text\">Run History · Protocol workspace · Chat with Sociius<\u002Ftd><\u002Ftr>\n        <tr><td>Run codes<\u002Ftd><td>Letter prefix + 4-digit number<\u002Ftd><td class=\"mono-text\">R-4821 · R-4820<\u002Ftd><\u002Ftr>\n        <tr><td>Timestamps<\u002Ftd><td>Friendly relative · 24-h clock<\u002Ftd><td class=\"mono-text\">Today · 14:32 · Yesterday · 17:21 · 22 Apr · 09:48<\u002Ftd><\u002Ftr>\n        <tr><td>Empty state headline<\u002Ftd><td>Light display · question or invitation<\u002Ftd><td>What procedure should we run?<\u002Ftd><\u002Ftr>\n        <tr><td>Empty state body<\u002Ftd><td>One sentence · says exactly what to do<\u002Ftd><td>Describe a lab procedure in plain English — I'll turn it into an ordered, executable protocol.<\u002Ftd><\u002Ftr>\n        <tr><td>Progress indicator<\u002Ftd><td>Mono · step fraction + elapsed<\u002Ftd><td class=\"mono-text\">04 / 09 · 00:12:41 elapsed<\u002Ftd><\u002Ftr>\n        <tr><td>Banner title<\u002Ftd><td>Past tense · specific<\u002Ftd><td>Run complete · Run halted at step 04<\u002Ftd><\u002Ftr>\n        <tr><td>Agent reply<\u002Ftd><td>Past tense summary + what's available next<\u002Ftd><td>Generated a 9-step protocol. Reuse it, tweak and regenerate, or start something new.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fsection>\n\n  <!-- DO / DON'T -->\n  <section class=\"section\" id=\"dodont\">\n    <span class=\"section-tag\">15 · Do &amp; Don't<\u002Fspan>\n    <h2 class=\"section-title\">Common mistakes to avoid<\u002Fh2>\n    <p class=\"section-note\">The rules below prevent the most common drift away from the EIT design language.<\u002Fp>\n\n    <div class=\"do-dont\" style=\"margin-bottom:24px\">\n      <div class=\"do-cell\">\n        <div class=\"do-header\"><span class=\"do-pill do\">✓ Do<\u002Fspan><strong>Color<\u002Fstrong><\u002Fdiv>\n        <div class=\"do-item\">Use <code style=\"font-family:var(--f-mono);font-size:12px\">--terracotta<\u002Fcode> as a 1px stroke, label color, or filled primary button<\u002Fdiv>\n        <div class=\"do-item\">Use <code style=\"font-family:var(--f-mono);font-size:12px\">--terracotta-tint<\u002Fcode> for subtle active / hover backgrounds<\u002Fdiv>\n        <div class=\"do-item\">Keep page background on <code style=\"font-family:var(--f-mono);font-size:12px\">--cream<\u002Fcode> and card surfaces on <code style=\"font-family:var(--f-mono);font-size:12px\">--paper<\u002Fcode><\u002Fdiv>\n        <div class=\"do-item\">Use status colors (ok, err, running) only for their semantic meaning<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"do-cell\">\n        <div class=\"do-header\"><span class=\"do-pill dont\">✕ Don't<\u002Fspan><strong>Color<\u002Fstrong><\u002Fdiv>\n        <div class=\"dont-item\">Use terracotta as a large background fill on full panels or sections<\u002Fdiv>\n        <div class=\"dont-item\">Introduce new accent colors not in the palette — no blues, purples, or greens outside status<\u002Fdiv>\n        <div class=\"dont-item\">Use gradients anywhere in the UI<\u002Fdiv>\n        <div class=\"dont-item\">Use <code style=\"font-family:var(--f-mono);font-size:12px\">--ok<\u002Fcode> green for decorative purposes outside success states<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"do-dont\" style=\"margin-bottom:24px\">\n      <div class=\"do-cell\">\n        <div class=\"do-header\"><span class=\"do-pill do\">✓ Do<\u002Fspan><strong>Typography<\u002Fstrong><\u002Fdiv>\n        <div class=\"do-item\">Use Light (300) weight for all display and heading sizes<\u002Fdiv>\n        <div class=\"do-item\">Use Source Code Pro for timestamps, run codes, counters, and section labels<\u002Fdiv>\n        <div class=\"do-item\">Apply negative tracking (-.01em) to display sizes 26px+<\u002Fdiv>\n        <div class=\"do-item\">Keep body text at 14–16px Regular with 1.5–1.6 line height<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"do-cell\">\n        <div class=\"do-header\"><span class=\"do-pill dont\">✕ Don't<\u002Fspan><strong>Typography<\u002Fstrong><\u002Fdiv>\n        <div class=\"dont-item\">Use Bold weight on headings — it kills the editorial lightness<\u002Fdiv>\n        <div class=\"dont-item\">Use Source Code Pro for body paragraphs or headings<\u002Fdiv>\n        <div class=\"dont-item\">Mix in additional typefaces — the system is Source Sans 3 + Source Code Pro only<\u002Fdiv>\n        <div class=\"dont-item\">Set display text below 22px — compress density by shortening copy, not shrinking type<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"do-dont\" style=\"margin-bottom:24px\">\n      <div class=\"do-cell\">\n        <div class=\"do-header\"><span class=\"do-pill do\">✓ Do<\u002Fspan><strong>Layout &amp; Borders<\u002Fstrong><\u002Fdiv>\n        <div class=\"do-item\">Use 1px hairline borders (<code style=\"font-family:var(--f-mono);font-size:12px\">--hair<\u002Fcode>) for all containers<\u002Fdiv>\n        <div class=\"do-item\">Stick to the 4pt grid for all spacing values<\u002Fdiv>\n        <div class=\"do-item\">Use a 2px left-border accent for active items in lists<\u002Fdiv>\n        <div class=\"do-item\">Keep card radius at 0–10px — typically 6px for interactive elements<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"do-cell\">\n        <div class=\"do-header\"><span class=\"do-pill dont\">✕ Don't<\u002Fspan><strong>Layout &amp; Borders<\u002Fstrong><\u002Fdiv>\n        <div class=\"dont-item\">Add box-shadows — the system uses hairlines only<\u002Fdiv>\n        <div class=\"dont-item\">Use border-radius above 12px on any container<\u002Fdiv>\n        <div class=\"dont-item\">Use arbitrary spacing values — round to the nearest multiple of 4<\u002Fdiv>\n        <div class=\"dont-item\">Stack multiple 1px borders close together — maintain breathing room<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"do-dont\">\n      <div class=\"do-cell\">\n        <div class=\"do-header\"><span class=\"do-pill do\">✓ Do<\u002Fspan><strong>Copy &amp; Labels<\u002Fstrong><\u002Fdiv>\n        <div class=\"do-item\">Write section labels in UPPERCASE mono — <em>Run History<\u002Fem>, <em>Chat with Sociius<\u002Fem><\u002Fdiv>\n        <div class=\"do-item\">Use · (middle dot) as the separator in mono metadata strings<\u002Fdiv>\n        <div class=\"do-item\">Keep button labels short: verb + noun max — <em>Reuse Protocol<\u002Fem>, <em>New procedure<\u002Fem><\u002Fdiv>\n        <div class=\"do-item\">State errors specifically — name the step number and reason<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"do-cell\">\n        <div class=\"do-header\"><span class=\"do-pill dont\">✕ Don't<\u002Fspan><strong>Copy &amp; Labels<\u002Fstrong><\u002Fdiv>\n        <div class=\"dont-item\">Use exclamation marks anywhere in the UI<\u002Fdiv>\n        <div class=\"dont-item\">Use emoji in labels, buttons, or status messages<\u002Fdiv>\n        <div class=\"dont-item\">Write vague error copy — <em>\"Something went wrong\"<\u002Fem> — always be specific<\u002Fdiv>\n        <div class=\"dont-item\">Mix title case and UPPERCASE on the same surface — pick one per component type<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <div class=\"footer\">\n    <span>Sociius · EIT Frontend Style Guide<\u002Fspan>\n    <span>v1 · April 2026<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv><!-- /main -->\n<\u002Fdiv><!-- /page -->\n\n<script>\n// Scrollspy\nconst links = document.querySelectorAll('.nav-link');\nconst sections = document.querySelectorAll('section[id], header[id]');\n\nconst observer = new IntersectionObserver(entries => {\n  entries.forEach(entry => {\n    if(entry.isIntersecting){\n      links.forEach(l => l.classList.remove('active'));\n      const active = document.querySelector(`.nav-link[href=\"#${entry.target.id}\"]`);\n      if(active) active.classList.add('active');\n    }\n  });\n}, {threshold:0.15, rootMargin:'-48px 0px -60% 0px'});\n\nsections.forEach(s => observer.observe(s));\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
